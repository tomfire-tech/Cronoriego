<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CronoRiego — Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --teal-900:#0f3a52;--teal-700:#1A5276;--teal-500:#2E86AB;--teal-50:#eaf3f8;
    --green-700:#1E8449;--green-500:#2fa365;--green-50:#ecf7f0;
    --ink:#0e1f26;--ink-2:#344e5c;--muted:#6a8391;--line:#e4ecef;
    --bg:#f7faf9;--white:#ffffff;--danger:#c0392b;--danger-bg:#fdf2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;}

  .wrap{width:100%;max-width:400px;padding:24px;}

  .logo{text-align:center;margin-bottom:32px;}
  .logo-brand{font-size:24px;font-weight:800;}
  .logo-brand span:first-child{color:var(--teal-700);}
  .logo-brand span:last-child{color:var(--green-700);}
  .logo-sub{font-size:13px;color:var(--muted);margin-top:4px;}

  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:32px;box-shadow:0 4px 16px rgba(15,58,82,0.08);}
  .card-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--teal-900);margin-bottom:4px;}
  .card-desc{font-size:13px;color:var(--muted);margin-bottom:24px;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px;}
  .field input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;color:var(--ink);transition:border-color .2s,box-shadow .2s;}
  .field input:focus{outline:none;border-color:var(--teal-700);box-shadow:0 0 0 3px rgba(26,82,118,.1);}

  .btn-login{width:100%;padding:13px;border:none;border-radius:999px;background:var(--teal-700);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 16px rgba(26,82,118,.22);transition:background .2s;margin-top:4px;}
  .btn-login:hover{background:var(--teal-900);}
  .btn-login:disabled{opacity:.6;cursor:not-allowed;}

  .error-msg{background:var(--danger-bg);border:1px solid rgba(192,57,43,.2);color:var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}
  .error-msg.show{display:block;}

  .footer-note{text-align:center;font-size:12px;color:var(--muted);margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-brand"><span>CRONO</span><span>RIEGO</span></div>
    <div class="logo-sub">Gestión inteligente de riego y nutrición</div>
  </div>
  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    <div class="card-desc">Ingresa con tu correo y contraseña.</div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="btn-login" onclick="login()">Ingresar</button>
    <div class="error-msg" id="error-msg">Correo o contraseña incorrectos.</div>
  </div>
  <div class="footer-note">¿Problemas para ingresar? Contacta a contacto@cronoriego.com</div>
</div>

<script>
const SUPABASE_URL = 'https://lmexinxdmkgexpthuosn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtZXhpbnhkbWtnZXhwdGh1b3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjgzMTQsImV4cCI6MjA5NTQwNDMxNH0.NiC1H1gDEKNbjob6XGGMu8Zaf2b4uLZLOuKzwioBgS0';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Si ya hay sesión activa, redirigir al dashboard
db.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});

async function login() {
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    err.textContent = 'Completa tu correo y contraseña.';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  err.classList.remove('show');

  const { error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    err.textContent = 'Correo o contraseña incorrectos.';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  } else {
    window.location.href = 'dashboard.html';
  }
}

// Enter para login
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
