<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CronoRiego</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --c-soil:#1a3a2a; --c-water:#1A5276; --c-water-l:#eaf3f8;
  --c-leaf:#1E8449;  --c-leaf-l:#ecf7f0;
  --c-sun:#d29922;   --c-sun-l:#fff8e6;
  --c-danger:#c0392b;--c-danger-l:#fdf2f2;
  --c-ink:#0e1f26;   --c-ink2:#344e5c; --c-muted:#6a8391;
  --c-line:#e4ecef;  --c-line2:#f0f4f2;
  --c-bg:#f5f8f6;    --c-white:#ffffff;
  --sidebar:56px;
  --topbar:56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Manrope',sans-serif;background:var(--c-bg);color:var(--c-ink);display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{height:var(--topbar);background:var(--c-white);border-bottom:1px solid var(--c-line);display:flex;align-items:center;padding:0 16px 0 0;gap:0;flex-shrink:0;z-index:50;}
.top-brand{width:var(--sidebar);height:100%;display:flex;align-items:center;justify-content:center;background:var(--c-soil);flex-shrink:0;}
.top-brand svg{width:24px;height:24px;}
.top-selectors{display:flex;align-items:center;gap:4px;padding:0 16px;flex:1;}
.top-sel{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--c-line);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--c-ink2);background:var(--c-white);transition:border-color .15s;}
.top-sel:hover{border-color:var(--c-water);}
.top-sel select{border:none;outline:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--c-ink);background:transparent;cursor:pointer;max-width:140px;}
.top-sel label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-muted);}
.top-week{display:flex;align-items:center;gap:4px;padding:6px 10px;border:1px solid var(--c-line);border-radius:8px;font-size:13px;font-weight:600;color:var(--c-ink);background:var(--c-white);}
.top-week button{border:none;background:none;cursor:pointer;color:var(--c-muted);font-size:14px;padding:0 2px;line-height:1;display:flex;align-items:center;}
.top-week button:hover{color:var(--c-water);}
.top-climate{display:flex;align-items:center;gap:16px;padding:0 16px;border-left:1px solid var(--c-line);margin-left:8px;}
.clim-item{display:flex;align-items:center;gap:6px;font-size:13px;}
.clim-val{font-weight:700;color:var(--c-ink);}
.clim-lbl{font-size:11px;color:var(--c-muted);}
.top-user{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--c-line);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-left:8px;position:relative;background:var(--c-white);}
.top-user:hover{border-color:var(--c-water);}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--c-water);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.user-dd{position:absolute;right:0;top:calc(100%+6px);background:var(--c-white);border:1px solid var(--c-line);border-radius:10px;box-shadow:0 8px 24px rgba(14,31,38,.12);min-width:170px;overflow:hidden;display:none;z-index:100;}
.user-dd.open{display:block;}
.dd-btn{width:100%;text-align:left;padding:10px 14px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--c-ink);}
.dd-btn:hover{background:var(--c-bg);}
.dd-btn.red{color:var(--c-danger);}
.dd-sep{height:1px;background:var(--c-line);margin:0 10px;}

/* ── SHELL ── */
.shell{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--c-white);border-right:1px solid var(--c-line);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0;}
.sb-btn{width:40px;height:40px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--c-muted);font-size:20px;transition:all .15s;position:relative;}
.sb-btn:hover{background:var(--c-bg);color:var(--c-water);}
.sb-btn.active{background:var(--c-water-l);color:var(--c-water);}
.sb-btn .tip{position:absolute;left:calc(100%+8px);background:var(--c-ink);color:#fff;font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:99;}
.sb-btn:hover .tip{opacity:1;}
.sb-sep{width:24px;height:1px;background:var(--c-line);margin:4px 0;}
.sb-bottom{margin-top:auto;}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── STATUS BANNER ── */
.banner{background:var(--c-white);border-bottom:1px solid var(--c-line);padding:12px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;flex-shrink:0;}
.ban-estado{display:flex;align-items:center;gap:10px;padding-right:20px;border-right:1px solid var(--c-line);}
.ban-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ban-icon.ok{background:var(--c-leaf-l);color:var(--c-leaf);}
.ban-icon.warn{background:var(--c-sun-l);color:var(--c-sun);}
.ban-icon.err{background:var(--c-danger-l);color:var(--c-danger);}
.ban-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--c-muted);}
.ban-val{font-size:13px;font-weight:700;color:var(--c-ink);}
.ban-kpis{display:flex;gap:24px;flex:1;flex-wrap:wrap;}
.ban-kpi{display:flex;flex-direction:column;gap:2px;}
.ban-kpi .lbl{font-size:10px;color:var(--c-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.ban-kpi .val{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--c-ink);line-height:1;}
.ban-kpi .val span{font-size:12px;font-weight:500;color:var(--c-muted);margin-left:3px;}
.ban-kpi .val.green{color:var(--c-leaf);}
.ban-kpi .val.blue{color:var(--c-water);}
.ban-kpi .val.amber{color:var(--c-sun);}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:0;flex:1;overflow:hidden;}
.main-left{overflow-y:auto;padding:16px;}
.main-right{border-left:1px solid var(--c-line);overflow-y:auto;display:flex;flex-direction:column;background:var(--c-white);}

/* ── TABLA SEMANAL ── */
.tabla-wrap{background:var(--c-white);border:1px solid var(--c-line);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.tabla-header{padding:12px 16px;border-bottom:1px solid var(--c-line);display:flex;align-items:center;justify-content:space-between;}
.tabla-header h3{font-size:13px;font-weight:700;color:var(--c-ink2);display:flex;align-items:center;gap:6px;}
.tabla-legend{display:flex;gap:12px;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--c-muted);}
.leg-dot{width:8px;height:8px;border-radius:2px;}
table.semana{width:100%;border-collapse:collapse;}
table.semana th{padding:8px 12px;text-align:center;font-size:11px;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--c-line);background:var(--c-bg);}
table.semana th.zona-col{text-align:left;width:180px;}
table.semana td{padding:0;border-bottom:1px solid var(--c-line2);vertical-align:middle;}
table.semana tr:last-child td{border-bottom:none;}
.zona-info{padding:10px 12px;}
.zona-nombre{font-size:12px;font-weight:700;color:var(--c-ink);display:flex;align-items:center;gap:6px;}
.zona-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.zona-esp{font-size:11px;color:var(--c-muted);margin-top:1px;padding-left:14px;}
.zona-ha{font-size:10px;color:var(--c-muted);padding-left:14px;}
.dia-cell{padding:6px 4px;text-align:center;min-width:90px;}
.dia-evento{background:var(--c-water-l);border-radius:8px;padding:6px 8px;display:inline-flex;flex-direction:column;align-items:center;gap:2px;min-width:76px;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.dia-evento:hover{border-color:var(--c-water);box-shadow:0 2px 8px rgba(26,82,118,.15);}
.dia-evento.est{background:#e8f5e9;border-color:rgba(30,132,73,.2);}
.dia-evento.est:hover{border-color:var(--c-leaf);}
.dia-evento.ambos{background:linear-gradient(135deg,#e8f5e9 50%,var(--c-water-l) 50%);border-color:rgba(30,132,73,.2);}
.dia-t{font-size:13px;font-weight:700;color:var(--c-water);}
.dia-evento.est .dia-t{color:var(--c-leaf);}
.dia-l{font-size:10px;color:var(--c-muted);}
.dia-check{font-size:10px;color:var(--c-leaf);font-weight:700;display:flex;align-items:center;gap:2px;}
.dia-vacio{color:var(--c-line);font-size:18px;}
.totals-row td{background:var(--c-bg);padding:8px 12px;font-size:12px;font-weight:700;color:var(--c-ink2);border-top:2px solid var(--c-line);}
.totals-row td.zona-col{color:var(--c-muted);font-weight:600;}

/* ── KPIs INFERIORES ── */
.kpis-bottom{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.kpi-b{background:var(--c-white);border:1px solid var(--c-line);border-radius:10px;padding:14px 16px;}
.kpi-b .lbl{font-size:10px;color:var(--c-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.kpi-b .lbl i{font-size:13px;}
.kpi-b .val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--c-ink);line-height:1;}
.kpi-b .val.green{color:var(--c-leaf);}
.kpi-b .val.blue{color:var(--c-water);}
.kpi-b .val.amber{color:var(--c-sun);}
.kpi-b .sub{font-size:11px;color:var(--c-muted);margin-top:3px;}

/* ── PANEL DERECHO ── */
.right-section{padding:14px 14px 0;border-bottom:1px solid var(--c-line);padding-bottom:14px;}
.right-section:last-child{border-bottom:none;}
.right-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--c-muted);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.right-title i{font-size:14px;}

/* Próximos riegos */
.prox-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--c-line2);}
.prox-item:last-child{border-bottom:none;}
.prox-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.prox-info{flex:1;}
.prox-zona{font-size:12px;font-weight:700;color:var(--c-ink);}
.prox-fecha{font-size:11px;color:var(--c-muted);}
.prox-t{font-size:12px;font-weight:700;color:var(--c-water);background:var(--c-water-l);padding:3px 8px;border-radius:6px;white-space:nowrap;}

/* Alertas */
.alerta{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--c-line2);}
.alerta:last-child{border-bottom:none;}
.alerta-ico{font-size:15px;flex-shrink:0;margin-top:1px;}
.alerta.warn .alerta-ico{color:var(--c-sun);}
.alerta.danger .alerta-ico{color:var(--c-danger);}
.alerta.info .alerta-ico{color:var(--c-water);}
.alerta-txt{font-size:12px;font-weight:600;color:var(--c-ink);line-height:1.35;}
.alerta-sub{font-size:11px;color:var(--c-muted);margin-top:1px;}

/* Resumen semanal */
.resumen-table{width:100%;border-collapse:collapse;font-size:12px;}
.resumen-table th{color:var(--c-muted);font-weight:600;text-align:right;padding:4px 6px;font-size:10px;text-transform:uppercase;}
.resumen-table th:first-child{text-align:left;}
.resumen-table td{padding:5px 6px;border-bottom:1px solid var(--c-line2);text-align:right;}
.resumen-table td:first-child{text-align:left;display:flex;align-items:center;gap:5px;}
.resumen-table tr:last-child td{border-bottom:none;font-weight:700;color:var(--c-ink);background:var(--c-bg);}

/* ── DRAWER ── */
.scrim{position:fixed;inset:0;background:rgba(14,31,38,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.scrim.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;right:0;top:0;height:100%;width:min(420px,90vw);background:var(--c-white);box-shadow:-4px 0 24px rgba(14,31,38,.12);z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.dh{padding:18px 20px;border-bottom:1px solid var(--c-line);display:flex;align-items:flex-start;justify-content:space-between;}
.dh .dt{font-family:'Fraunces',serif;font-size:19px;font-weight:700;text-transform:capitalize;}
.dh .ds{font-size:12px;color:var(--c-muted);margin-top:2px;}
.dclose{border:none;background:var(--c-bg);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;color:var(--c-muted);display:grid;place-items:center;flex:none;}
.db{padding:18px 20px;overflow-y:auto;flex:1;}
.cmp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--c-line2);font-size:13px;}
.cmp-row:last-child{border-bottom:none;}
.cmp-k{color:var(--c-muted);}
.cmp-v{display:flex;gap:16px;}
.cmp-est{color:var(--c-leaf);font-weight:700;min-width:70px;text-align:right;}
.cmp-pron{color:var(--c-water);font-weight:700;min-width:70px;text-align:right;}

/* ── MODAL CLAVE ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(14,31,38,.5);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--c-white);border-radius:16px;padding:26px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(14,31,38,.2);}
.f-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-muted);display:block;margin-bottom:5px;}
.f-wrap{position:relative;margin-bottom:12px;}
.f-input{width:100%;padding:10px 38px 10px 12px;border:1.5px solid var(--c-line);border-radius:8px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
.f-input:focus{border-color:var(--c-water);}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--c-muted);font-size:16px;}
.req-item{font-size:11px;color:var(--c-muted);display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.req-item.ok{color:var(--c-leaf);}
.msg{font-size:12px;padding:8px 12px;border-radius:7px;margin:10px 0;display:none;}
.msg.ok{background:var(--c-leaf-l);color:var(--c-leaf);border:1px solid rgba(30,132,73,.2);}
.msg.err{background:var(--c-danger-l);color:var(--c-danger);border:1px solid rgba(192,57,43,.2);}
.btn-prim{width:100%;padding:11px;background:var(--c-water);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-prim:disabled{opacity:.5;cursor:not-allowed;}
.btn-prim:not(:disabled):hover{background:var(--c-soil);}

/* ── LOADING / EMPTY ── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--c-muted);font-size:13px;}
.loading-state i{font-size:32px;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.main-grid{grid-template-columns:1fr;}.main-right{border-left:none;border-top:1px solid var(--c-line);}.kpis-bottom{grid-template-columns:repeat(3,1fr);}}
@media(max-width:720px){.ban-kpis{gap:14px;}.kpis-bottom{grid-template-columns:repeat(2,1fr);}.top-climate{display:none;}}
</style>
</head>
<body>

<!-- SCRIM + DRAWER detalle día -->
<div class="scrim" id="scrim" onclick="cerrarDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="dh">
    <div><div class="dt" id="dw-title">—</div><div class="ds" id="dw-sub">—</div></div>
    <button class="dclose" onclick="cerrarDrawer()">✕</button>
  </div>
  <div class="db" id="dw-body"></div>
</aside>

<!-- MODAL CAMBIAR CLAVE -->
<div class="modal-ov" id="modal-clave" onclick="if(event.target===this)cerrarClave()">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div>
        <div style="font-family:'Fraunces',serif;font-size:19px;font-weight:700">Cambiar contraseña</div>
        <div style="font-size:12px;color:var(--c-muted);margin-top:2px">Elige una contraseña segura</div>
      </div>
      <button onclick="cerrarClave()" style="border:none;background:var(--c-bg);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;color:var(--c-muted);display:grid;place-items:center;">✕</button>
    </div>
    <label class="f-label">Nueva contraseña</label>
    <div class="f-wrap"><input type="password" id="inp-a" class="f-input" placeholder="Mínimo 8 caracteres" oninput="validarClave()"><button class="eye" onclick="toggleVer('inp-a','ico-a')"><i class="ti ti-eye" id="ico-a"></i></button></div>
    <label class="f-label">Confirmar</label>
    <div class="f-wrap"><input type="password" id="inp-b" class="f-input" placeholder="Repite la contraseña" oninput="validarClave()"><button class="eye" onclick="toggleVer('inp-b','ico-b')"><i class="ti ti-eye" id="ico-b"></i></button></div>
    <div style="margin:6px 0 12px;">
      <div class="req-item" id="r-len"><i class="ti ti-circle" style="font-size:10px"></i>Mínimo 8 caracteres</div>
      <div class="req-item" id="r-num"><i class="ti ti-circle" style="font-size:10px"></i>Al menos un número</div>
      <div class="req-item" id="r-may"><i class="ti ti-circle" style="font-size:10px"></i>Al menos una mayúscula</div>
      <div class="req-item" id="r-match"><i class="ti ti-circle" style="font-size:10px"></i>Las contraseñas coinciden</div>
    </div>
    <div class="msg" id="clave-msg"></div>
    <button id="btn-clave" class="btn-prim" onclick="guardarClave()" disabled>Guardar contraseña</button>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="top-brand">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="22" r="8" fill="#2E86AB" opacity=".9"/>
      <path d="M16 4 C16 4 8 12 8 18 C8 22.4 11.6 26 16 26 C20.4 26 24 22.4 24 18 C24 12 16 4 16 4Z" fill="#7EC8A0"/>
    </svg>
  </div>
  <div class="top-selectors">
    <div class="top-sel">
      <label>Predio</label>
      <select id="sel-predio" onchange="onPredioChange()"><option>—</option></select>
    </div>
    <div class="top-sel">
      <label>Equipo</label>
      <select id="sel-equipo" onchange="onEquipoChange()"><option>—</option></select>
    </div>
    <div class="top-week">
      <button onclick="cambiarSemana(-1)"><i class="ti ti-chevron-left"></i></button>
      <span id="lbl-semana">Sem. — (— - —)</span>
      <button onclick="cambiarSemana(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="top-climate">
    <div class="clim-item">
      <i class="ti ti-temperature" style="color:var(--c-sun);font-size:16px"></i>
      <div><div class="clim-val" id="clim-temp">—</div><div class="clim-lbl">Temp. media</div></div>
    </div>
    <div class="clim-item">
      <i class="ti ti-cloud-rain" style="color:var(--c-water);font-size:16px"></i>
      <div><div class="clim-val" id="clim-lluv">—</div><div class="clim-lbl">Lluvia 7d</div></div>
    </div>
  </div>
  <div class="top-user" onclick="toggleMenu()" id="user-btn">
    <div class="avatar" id="user-ini">—</div>
    <span id="user-nm">—</span>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function hm(h){
  const f=parseFloat(h);
  if(!f||f<=0)return null;
  const hh=Math.floor(f),mm=Math.round((f-hh)*60);
  return mm===60?`${hh+1}h 00min`:`${hh}h ${String(mm).padStart(2,'0')}min`;
}
function fmt(v,dec=1,suf=''){const f=parseFloat(v);return isNaN(f)||f===0?'—':f.toFixed(dec)+suf;}
function isoWeek(d){
  const dc=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dc.setUTCDate(dc.getUTCDate()+4-(dc.getUTCDay()||7));
  const y=new Date(Date.UTC(dc.getUTCFullYear(),0,1));
  return Math.ceil(((dc-y)/86400000+1)/7);
}
function inicioSemana(offset=0){
  const hoy=new Date();
  const dow=hoy.getDay()||7;
  const lun=new Date(hoy);
  lun.setDate(hoy.getDate()-(dow-1)+(offset*7));
  lun.setHours(0,0,0,0);
  return lun;
}
function diasSemana(offset=0){
  const lun=inicioSemana(offset);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(lun);
    d.setDate(lun.getDate()+i);
    return d;
  });
}
function fechaStr(d){return d.toISOString().slice(0,10);}
function fmtFechaCorta(d){
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return {dia:dias[d.getDay()],fecha:`${d.getDate()} ${meses[d.getMonth()]}`};
}

// ── RENDER BANNER ─────────────────────────────────────────────────────────────
function renderBanner(dias,scDia,semanal){
  const hoy=new Date();
  // Clima: promedio de la semana desde scDia
  let etoSumEst=0,etoSumPron=0,lluvSum=0,tempArr=[];
  scDia.forEach(r=>{
    etoSumEst+=parseFloat(r.eto_estacion_mm_dia)||0;
    etoSumPron+=parseFloat(r.eto_pronostico_mm_dia)||0;
    lluvSum+=parseFloat(r.lluvia_pronostico_mm_dia)||0;
  });
  // Clima topbar
  const etoRef=etoSumEst>0?etoSumEst:etoSumPron;
  // Temperatura estimada desde ETo (aproximación inversa PM simplificada)
  const tempEst=etoRef>0?(etoRef/7*5+10).toFixed(1):'—';
  document.getElementById('clim-temp').textContent=tempEst!=='—'?tempEst+'°C':'—';
  document.getElementById('clim-lluv').textContent=lluvSum>0?lluvSum.toFixed(1)+' mm':'0 mm';

  // Volumen total semana (suma de todas las zonas)
  let volTotal=0,energiaTotal=0;
  const znIds=STATE.zonas.map(z=>z.id_zona);
  // Cobertura: zonas con al menos 1 día de riego
  const zonasConRiego=new Set();
  scDia.forEach(r=>{
    const lamEst=parseFloat(r.lamina_neta_riego_estacion_mm)||0;
    const lamPron=parseFloat(r.lamina_neta_riego_pronostico_mm)||0;
    if(lamEst>0||lamPron>0)zonasConRiego.add(r.id_zona);
  });
  const cobertura=STATE.zonas.length>0?Math.round(zonasConRiego.size/STATE.zonas.length*100):0;

  // Volumen desde semanal
  if(semanal){
    volTotal=parseFloat(semanal['volumen_total_m3']||semanal['volumen_semanal_m3']||0)||0;
    energiaTotal=parseFloat(semanal['energia_total_kwh']||semanal['energia_kwh']||0)||0;
  }
  // Fallback: calcular desde diaria
  if(!volTotal){
    scDia.forEach(r=>{
      const z=STATE.zonas.find(zz=>zz.id_zona===r.id_zona);
      const ha=parseFloat(z?.superficie_ha)||0;
      const lam=(parseFloat(r.lamina_neta_riego_pronostico_mm)||0)+(parseFloat(r.lamina_neta_riego_estacion_mm)||0);
      volTotal+=lam*ha*10; // mm × ha × 10 = m³
    });
    volTotal=Math.round(volTotal);
  }

  const estadoOk=cobertura>=80;
  const estadoTxt=estadoOk?'Agua disponible suficiente':'Verificar disponibilidad';

  document.getElementById('banner').innerHTML=`

      </div>
    </div>
    <div class="ban-kpis">
      <div class="ban-kpi">
        <div class="lbl">Volumen programado</div>
        <div class="val blue">${volTotal>0?volTotal.toLocaleString('es-CL'):'—'}<span>m³</span></div>
        <div style="font-size:11px;color:var(--c-muted)">Esta semana</div>
      </div>
      <div class="ban-kpi">
        <div class="lbl">Cobertura de riego</div>
        <div class="val ${cobertura>=80?'green':'amber'}">${cobertura}<span>%</span></div>
        <div style="font-size:11px;color:var(--c-muted)">${zonasConRiego.size}/${STATE.zonas.length} zonas</div>
      </div>
      <div class="ban-kpi">
        <div class="lbl">ETo semana</div>
        <div class="val">${etoRef>0?etoRef.toFixed(1):'—'}<span>mm</span></div>
        <div style="font-size:11px;color:var(--c-muted)">${etoSumEst>0?'Estación':'Pronóstico'}</div>
      </div>
      <div class="ban-kpi">
        <div class="lbl">Lluvia probable</div>
        <div class="val">${lluvSum>0?lluvSum.toFixed(1):'0'}<span>mm</span></div>
        <div style="font-size:11px;color:var(--c-muted)">En 7 días</div>
      </div>
      ${energiaTotal>0?`<div class="ban-kpi"><div class="lbl">Energía estimada</div><div class="val">${energiaTotal.toFixed(0)}<span>kWh</span></div><div style="font-size:11px;color:var(--c-muted)">Esta semana</div></div>`:''}
    </div>
  `;
}

                  <div class="zona-nombre"><div class="zona-dot" style="background:${color}"></div>${z.nombre||z.id_zona}</div>
                  <div class="zona-esp">${z.especie||'—'} ${z.variedad||''}</div>
                  <div class="zona-ha">${z.superficie_ha||'—'} ha${ndvi?` · NDVI ${ndvi.ndvi.toFixed(2)}`:''}${ndvi?` · Kc ${ndvi.kc.toFixed(2)}`:''}</div>
                </div>
              </td>
              ${dias.map(d=>{
                const fs=fechaStr(d);
                const r=dataMap[z.id_zona]?.[fs];
                const lEst=r?parseFloat(r.lamina_neta_riego_estacion_mm)||0:0;
                const lPron=r?parseFloat(r.lamina_neta_riego_pronostico_mm)||0:0;
                const tEst=r?parseFloat(r.tiempo_de_riego_estacion_horas)||0:0;
                const tPron=r?parseFloat(r.tiempo_de_riego_pronostico_horas)||0:0;
                const tieneEst=lEst>0;
                const tienePron=lPron>0;
                const fd=new Date(fs+'T00:00:00');
                const pasado=fd<hoy;
                if(!tieneEst&&!tienePron)return`<td class="dia-cell"><span class="dia-vacio">—</span></td>`;
                const cls=tieneEst&&tienePron?'ambos':tieneEst?'est':'';
                const tShow=hm(tEst||tPron)||'—';
                const lShow=(lEst||lPron).toFixed(0);
                return`<td class="dia-cell">
                  <div class="dia-evento ${cls}" onclick="abrirDia('${fs}','${z.id_zona}')">
                    <div class="dia-t" style="${tieneEst?'color:var(--c-leaf)':''}">${tShow}</div>
                    <div class="dia-l">${lShow} mm</div>
                    ${tieneEst&&pasado?`<div class="dia-check"><i class="ti ti-circle-check"></i>Real</div>`:''}
                  </div>
                </td>`;
              }).join('')}
            </tr>`;
          }).join('')}
          <!-- Fila totales -->
          <tr class="totals-row">
            <td class="zona-col">Total equipo</td>
            ${totalesDia.map(t=>{
              const lT=(t.lEst||t.lPron).toFixed(0);
              const tT=hm(t.tEst||t.tPron);
              return`<td style="text-align:center;padding:8px 4px;">${lT!=='0'?`<div style="font-size:12px">${lT} mm</div><div style="font-size:10px;color:var(--c-muted)">${tT||''}</div>`:'<span style="color:var(--c-line)">—</span>'}</td>`;
            }).join('')}
          </tr>
        </tbody>
      </table>
    </div>

    <!-- KPIs INFERIORES -->
    <div class="kpis-bottom">
      <div class="kpi-b">
        <div class="lbl"><i class="ti ti-droplet" style="color:var(--c-water)"></i>Demanda total</div>
        <div class="val blue">${totLamNeta>0?totLamNeta.toFixed(0):'—'}</div>
        <div class="sub">mm lámina neta acumulada</div>
      </div>
      <div class="kpi-b">
        <div class="lbl"><i class="ti ti-waves" style="color:var(--c-water)"></i>Volumen a aplicar</div>
        <div class="val blue">${totVol>0?Math.round(totVol).toLocaleString('es-CL'):'—'}</div>
        <div class="sub">m³ en todas las zonas</div>
      </div>
      <div class="kpi-b">
        <div class="lbl"><i class="ti ti-clock" style="color:var(--c-sun)"></i>Tiempo total</div>
        <div class="val">${hm(totTiempo)||'—'}</div>
        <div class="sub">Horas de riego en el equipo</div>
      </div>
      <div class="kpi-b">
        <div class="lbl"><i class="ti ti-target" style="color:var(--c-leaf)"></i>Eficiencia</div>
        <div class="val ${efic>=90?'green':efic>=70?'':'amber'}">${efic!==null?efic+'%':'—'}</div>
        <div class="sub">${efic!==null?(efic>=90?'Buen desempeño':efic>=70?'Desempeño regular':'Revisar aplicación'):'Sin datos comparativos'}</div>
      </div>
      <div class="kpi-b">
        <div class="lbl"><i class="ti ti-plant-2" style="color:var(--c-leaf)"></i>Estado del cultivo</div>
        <div class="val ${colorEstado}">${estadoCultivo}</div>
        <div class="sub">${ndviProm?'NDVI promedio '+ndviProm:'Sin datos NDVI'}</div>
      </div>
    </div>
  `;
}

// ── RENDER DERECHO ────────────────────────────────────────────────────────────
function renderDerecho(dias,scDia,ndviMap){
  const hoy=new Date();
  const hoyStr=fechaStr(hoy);
  const dataMap={};
  scDia.forEach(r=>{
    if(!dataMap[r.id_zona])dataMap[r.id_zona]={};
    dataMap[r.id_zona][r.fecha]=r;
  });

  // PRÓXIMOS RIEGOS
  const proximos=[];
  dias.forEach(d=>{
    const fs=fechaStr(d);
    if(new Date(fs+'T00:00:00')<=hoy)return;
    STATE.zonas.forEach((z,zi)=>{
      const r=dataMap[z.id_zona]?.[fs];
      if(!r)return;
      const lPron=parseFloat(r.lamina_neta_riego_pronostico_mm)||0;
      const tPron=parseFloat(r.tiempo_de_riego_pronostico_horas)||0;
      if(lPron>0||tPron>0){
        proximos.push({zona:z,dia:d,r,color:ZONA_COLORS[zi%ZONA_COLORS.length]});
      }
    });
  });

  // ALERTAS automáticas
  const alertas=[];
  // 1. ETo alta (>6mm/día en invierno)
  const maxEto=Math.max(...scDia.map(r=>parseFloat(r.eto_pronostico_mm_dia)||0));
  if(maxEto>6)alertas.push({tipo:'warn',ico:'ti-temperature-plus',txt:'ETo alta pronosticada',sub:`Máximo ${maxEto.toFixed(1)} mm/día esta semana`});
  // 2. Lluvia significativa
  const totLluv=scDia.reduce((s,r)=>s+(parseFloat(r.lluvia_pronostico_mm_dia)||0),0);
  if(totLluv>15)alertas.push({tipo:'info',ico:'ti-cloud-rain',txt:'Lluvia significativa',sub:`${totLluv.toFixed(1)} mm pronosticados esta semana`});
  // 3. NDVI bajando
  STATE.zonas.forEach((z,zi)=>{
    const ndviData=ndviMap[z.id_zona];
    if(!ndviData)return;
    // Simplificado: si NDVI < 0.3 alerta
    if(ndviData.ndvi<0.3)alertas.push({tipo:'warn',ico:'ti-plant-off',txt:`NDVI bajo en ${z.nombre||z.id_zona}`,sub:`NDVI ${ndviData.ndvi.toFixed(3)} — posible estrés hídrico`});
  });
  if(alertas.length===0)alertas.push({tipo:'ok',ico:'ti-circle-check',txt:'Sin alertas activas',sub:'Todo dentro de los parámetros normales'});

  // RESUMEN SEMANAL POR ZONA
  const resumen=STATE.zonas.map((z,zi)=>{
    let lamT=0,tT=0;
    dias.forEach(d=>{
      const r=dataMap[z.id_zona]?.[fechaStr(d)];
      if(r){
        lamT+=parseFloat(r.lamina_neta_riego_estacion_mm)||parseFloat(r.lamina_neta_riego_pronostico_mm)||0;
        tT+=parseFloat(r.tiempo_de_riego_estacion_horas)||parseFloat(r.tiempo_de_riego_pronostico_horas)||0;
      }
    });
    const ha=parseFloat(z.superficie_ha)||0;
    const vol=lamT*ha*10;
    return{z,zi,lamT,tT,vol,color:ZONA_COLORS[zi%ZONA_COLORS.length]};
  });
  const totalResumen={lam:resumen.reduce((s,r)=>s+r.lamT,0),t:resumen.reduce((s,r)=>s+r.tT,0),vol:resumen.reduce((s,r)=>s+r.vol,0)};

  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const dias_n=['dom','lun','mar','mié','jue','vie','sáb'];

  document.getElementById('main-right').innerHTML=`

    <!-- PRÓXIMOS RIEGOS -->
    <div class="right-section">
      <div class="right-title"><i class="ti ti-calendar-event"></i>Próximos riegos</div>
      ${proximos.slice(0,5).map(p=>{
        const {dia:fecha}=fmtFechaCorta(p.dia);
        const t=hm(parseFloat(p.r.tiempo_de_riego_pronostico_horas));
        return`<div class="prox-item">
          <div class="prox-dot" style="background:${p.color}"></div>
          <div class="prox-info">
            <div class="prox-zona">${p.zona.nombre||p.zona.id_zona}</div>
            <div class="prox-fecha">${dias_n[p.dia.getDay()]} ${fecha}</div>
          </div>
          ${t?`<div class="prox-t">${t}</div>`:''}
        </div>`;
      }).join('')}
      ${proximos.length===0?`<div style="font-size:12px;color:var(--c-muted);padding:8px 0">Sin riegos próximos esta semana</div>`:''}
    </div>

    <!-- ALERTAS -->
    <div class="right-section">
      <div class="right-title"><i class="ti ti-bell"></i>Alertas</div>
      ${alertas.map(a=>`
        <div class="alerta ${a.tipo}">
          <i class="ti ${a.ico} alerta-ico"></i>
          <div>
            <div class="alerta-txt">${a.txt}</div>
            <div class="alerta-sub">${a.sub}</div>
          </div>
        </div>`).join('')}
    </div>

    <!-- RESUMEN SEMANAL -->
    <div class="right-section">
      <div class="right-title"><i class="ti ti-table"></i>Resumen semanal por zona</div>
      <table class="resumen-table">
        <thead>
          <tr>
            <th>Zona</th>
            <th>Lámina</th>
            <th>Tiempo</th>
            <th>Vol m³</th>
          </tr>
        </thead>
        <tbody>
          ${resumen.map(r=>`
            <tr>
              <td><div class="zona-dot" style="background:${r.color}"></div>${r.z.nombre||r.z.id_zona}</td>
              <td>${r.lamT>0?r.lamT.toFixed(0)+' mm':'—'}</td>
              <td>${hm(r.tT)||'—'}</td>
              <td>${r.vol>0?Math.round(r.vol).toLocaleString('es-CL'):'—'}</td>
            </tr>`).join('')}
          <tr>
            <td>Total equipo</td>
            <td>${totalResumen.lam>0?totalResumen.lam.toFixed(0)+' mm':'—'}</td>
            <td>${hm(totalResumen.t)||'—'}</td>
            <td>${totalResumen.vol>0?Math.round(totalResumen.vol).toLocaleString('es-CL'):'—'}</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;
}

// ── ABRIR DÍA (DRAWER) ────────────────────────────────────────────────────────
function abrirDia(fecha,zonaId){
  const r=STATE.scDia.find(d=>d.fecha===fecha&&d.id_zona===zonaId);
  const z=STATE.zonas.find(zz=>zz.id_zona===zonaId);
  if(!r||!z)return;

  const dt=new Date(fecha+'T00:00:00');
  const dias_n=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const titulo=`${dias_n[dt.getDay()]} ${dt.getDate()} de ${meses[dt.getMonth()]}`;

  const lEst=parseFloat(r.lamina_neta_riego_estacion_mm)||0;
  const lPron=parseFloat(r.lamina_neta_riego_pronostico_mm)||0;
  const tEst=parseFloat(r.tiempo_de_riego_estacion_horas)||0;
  const tPron=parseFloat(r.tiempo_de_riego_pronostico_horas)||0;
  const etoEst=parseFloat(r.eto_estacion_mm_dia)||0;
  const etoPron=parseFloat(r.eto_pronostico_mm_dia)||0;
  const etcEst=parseFloat(r.etc_estacion_mm_dia)||0;
  const etcPron=parseFloat(r.etc_pronostico_mm_dia)||0;
  const lluvEst=parseFloat(r.lluvia_estacion_mm_dia)||0;
  const lluvPron=parseFloat(r.lluvia_pronostico_mm_dia)||0;
  const ndvi=STATE.ndviMap[zonaId];

  function row(label,est,pron,dec=2,suf=''){
    return`<div class="cmp-row">
      <span class="cmp-k">${label}</span>
      <div class="cmp-v">
        <span class="cmp-est">${est?est.toFixed(dec)+suf:'—'}</span>
        <span class="cmp-pron">${pron?pron.toFixed(dec)+suf:'—'}</span>
      </div>
    </div>`;
  }

  const html=`
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <span style="font-size:10px;font-weight:700;background:var(--c-leaf-l);color:var(--c-leaf);padding:4px 8px;border-radius:5px;">🌡 Estación</span>
      <span style="font-size:10px;font-weight:700;background:var(--c-water-l);color:var(--c-water);padding:4px 8px;border-radius:5px;">📡 Pronóstico</span>
    </div>
    ${row('ETo (mm/día)',etoEst,etoPron)}
    ${row('ETc (mm/día)',etcEst,etcPron)}
    ${row('Lluvia (mm)',lluvEst,lluvPron)}
    ${row('Lámina riego (mm)',lEst,lPron,1)}
    <div class="cmp-row">
      <span class="cmp-k">Tiempo de riego</span>
      <div class="cmp-v">
        <span class="cmp-est">${hm(tEst)||'—'}</span>
        <span class="cmp-pron">${hm(tPron)||'—'}</span>
      </div>
    </div>
    ${ndvi?`
    <div style="margin-top:16px;background:var(--c-leaf-l);border-radius:8px;padding:12px;border:1px solid rgba(30,132,73,.15);">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-leaf);margin-bottom:8px">Estado del cultivo</div>
      <div style="display:flex;gap:20px;">
        <div><div style="font-size:10px;color:var(--c-muted)">NDVI</div><div style="font-size:20px;font-weight:700;color:var(--c-leaf);font-family:'Fraunces',serif">${ndvi.ndvi.toFixed(3)}</div></div>
        <div><div style="font-size:10px;color:var(--c-muted)">Kc</div><div style="font-size:20px;font-weight:700;color:var(--c-water);font-family:'Fraunces',serif">${ndvi.kc.toFixed(2)}</div></div>
        <div><div style="font-size:10px;color:var(--c-muted)">Fecha</div><div style="font-size:13px;font-weight:600;margin-top:4px">${ndvi.fecha?.toString().slice(0,10)||'—'}</div></div>
      </div>
    </div>`:''}
    ${lEst>0&&lPron>0?`
    <div style="margin-top:12px;background:var(--c-bg);border-radius:8px;padding:12px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-muted);margin-bottom:6px">Comparativa</div>
      <div style="font-size:12px;color:var(--c-ink2)">
        Diferencia lámina: <strong style="color:${Math.abs(lEst-lPron)<5?'var(--c-leaf)':'var(--c-sun)'}">
        ${(lEst-lPron>0?'+':'')}${(lEst-lPron).toFixed(1)} mm</strong>
      </div>
    </div>`:''}
  `;

  abrirDrawer(titulo,`${z.id_zona} · ${z.especie||''} ${z.variedad||''}`,html);
}

init();
</script>
</body>
</html>
