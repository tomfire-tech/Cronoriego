<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CronoRiego — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --teal-900:#0f3a52;--teal-700:#1A5276;--teal-500:#2E86AB;--teal-50:#eaf3f8;
    --green-900:#154a29;--green-700:#1E8449;--green-500:#2fa365;--green-50:#ecf7f0;
    --amber:#d29922;--amber-bg:#fff8e6;
    --ink:#0e1f26;--ink-2:#344e5c;--muted:#6a8391;--line:#e4ecef;
    --bg:#f7faf9;--white:#ffffff;--danger:#c0392b;--danger-bg:#fdf2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

  /* ── TOPBAR ── */
  .topbar{background:var(--white);border-bottom:1px solid var(--line);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .brand{font-size:16px;font-weight:800;}
  .brand span:first-child{color:var(--teal-700);}
  .brand span:last-child{color:var(--green-700);}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .topbar-date{font-size:12px;color:var(--muted);}
  .topbar-semana{font-size:11px;font-weight:600;background:var(--teal-50);color:var(--teal-700);padding:3px 10px;border-radius:999px;}
  .user-btn{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--white);transition:background .2s;}
  .user-btn:hover{background:var(--bg);}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal-700);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

  /* ── SELECTORS ── */
  .selectors{background:var(--white);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .sel-group{display:flex;align-items:center;gap:6px;}
  .sel-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .sel-group select{padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--white);cursor:pointer;}
  .sel-group select:focus{outline:none;border-color:var(--teal-700);}
  .ndvi-chip{font-size:11px;font-weight:600;background:var(--green-50);color:var(--green-700);padding:4px 10px;border-radius:999px;border:1px solid rgba(30,132,73,.2);margin-left:auto;}

  /* ── HERO ── */
  .hero{background:linear-gradient(135deg,var(--teal-900),var(--teal-700));border-radius:14px;padding:22px 26px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
  .hero::after{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);pointer-events:none;}
  .hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:10px;}
  .hero-main{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:14px;}
  .hero-verb{font-family:'Fraunces',serif;font-size:clamp(26px,4vw,38px);font-weight:700;line-height:1.1;}
  .hero-tags{display:flex;gap:8px;flex-wrap:wrap;}
  .htag{font-size:12px;font-weight:600;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:5px 12px;}
  .htag.ferti{background:rgba(210,153,34,.85);border-color:transparent;}
  .hero-sub{font-size:13px;opacity:.88;max-width:65ch;margin-bottom:16px;line-height:1.55;}
  .hero-meta{display:flex;gap:24px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.15);padding-top:14px;}
  .hm-item{display:flex;flex-direction:column;gap:2px;}
  .hm-val{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  .hm-label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;opacity:.7;}

  /* ── LAYOUT ── */
  .main{padding:20px 24px;max-width:1400px;margin:0 auto;}

  /* ── KPIs ── */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px;}
  .kpi{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .kpi-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .kpi-val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1;}
  .kpi-unit{font-size:11px;color:var(--muted);margin-top:3px;}
  .kpi-val.green{color:var(--green-700);}
  .kpi-val.teal{color:var(--teal-700);}
  .kpi-val.amber{color:var(--amber);}

  /* ── GRID ── */
  .grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:14px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr;} .grid-3 > :first-child{grid-column:span 2;}}
  @media(max-width:720px){.grid-3,.grid-2{grid-template-columns:1fr;} .grid-3 > :first-child{grid-column:span 1;} .kpis{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:480px){.kpis{grid-template-columns:repeat(2,1fr);}}

  /* ── CARD ── */
  .card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .card-title i{font-size:16px;color:var(--teal-500);}

  /* ── BALANCE ── */
  .bal-track{height:10px;background:var(--bg);border-radius:6px;overflow:hidden;margin:10px 0 6px;}
  .bal-fill{height:100%;background:linear-gradient(90deg,var(--teal-700),var(--teal-500));border-radius:6px;transition:width .7s cubic-bezier(.2,.7,.2,1);}
  .bal-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}

  /* ── MÉTRICAS ── */
  .metric-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line);}
  .metric-row:last-child{border-bottom:none;}
  .metric-key{font-size:12px;color:var(--ink-2);}
  .metric-val{font-size:13px;font-weight:600;}
  .metric-val.green{color:var(--green-700);}
  .metric-val.teal{color:var(--teal-700);}
  .metric-val.amber{color:var(--amber);}

  /* ── CALENDARIO ── */
  .cal-grid{display:grid;grid-template-columns:28px repeat(7,1fr);gap:2px;font-size:11px;}
  .cal-dh{text-align:center;color:var(--muted);padding:3px 0;font-weight:600;}
  .cal-wn{color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;}
  .cal-cell{background:var(--bg);border:0.5px solid var(--line);border-radius:4px;padding:3px 4px;min-height:42px;}
  .cal-cell.hoy{border-color:var(--teal-700) !important;border-width:2px;}
  .cal-cell.riego{background:var(--green-50);border-color:rgba(30,132,73,.3);}
  .cal-cell.ferti{background:var(--teal-50);border-color:rgba(46,134,171,.3);}
  .cal-cell.otro-mes{opacity:.25;}
  .cal-clickable{cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .cal-clickable:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(30,132,73,.2);}
  .cal-dn{font-size:10px;font-weight:600;color:var(--ink-2);}
  .cal-cell.hoy .cal-dn{color:var(--teal-700);}
  .cal-ev{font-size:9px;color:var(--green-700);margin-top:2px;font-weight:600;}
  .cal-fe{font-size:9px;color:var(--teal-700);}
  .cal-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
  .cal-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
  .cal-leg-dot{width:8px;height:8px;border-radius:2px;}

  /* ── NUTRICIÓN ── */
  .nut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .nut-item{background:var(--bg);border-radius:8px;padding:10px;text-align:center;}
  .nut-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
  .nut-val{font-family:'Fraunces',serif;font-size:20px;font-weight:600;}
  .nut-unit{font-size:10px;color:var(--muted);}
  .nut-N .nut-val{color:#185FA5;}
  .nut-P .nut-val{color:#854F0B;}
  .nut-K .nut-val{color:var(--green-700);}

  /* ── NDVI CHART ── */
  .ndvi-chart{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px;}
  .ndvi-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .ndvi-bar-item{width:100%;background:var(--green-500);border-radius:2px 2px 0 0;}
  .ndvi-date{font-size:9px;color:var(--muted);}

  /* ── ALERTAS ── */
  .alerta{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:8px;}
  .alerta:last-child{margin-bottom:0;}
  .alerta.warn{background:var(--amber-bg);color:#633806;border:1px solid rgba(210,153,34,.2);}
  .alerta.ok{background:var(--green-50);color:var(--green-900);border:1px solid rgba(30,132,73,.2);}
  .alerta.info{background:var(--teal-50);color:var(--teal-900);border:1px solid rgba(46,134,171,.2);}
  .alerta i{font-size:16px;flex-shrink:0;margin-top:1px;}

  /* ── DRAWER ── */
  .scrim{position:fixed;inset:0;background:rgba(14,31,38,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;right:0;top:0;height:100%;width:min(420px,92vw);background:var(--white);box-shadow:-4px 0 24px rgba(14,31,38,.12);z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .drawer-head .dt{font-family:'Fraunces',serif;font-size:20px;font-weight:700;text-transform:capitalize;}
  .drawer-head .ds{font-size:12px;color:var(--muted);margin-top:2px;}
  .dclose{border:none;background:var(--bg);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);flex:none;display:grid;place-items:center;}
  .dclose:hover{background:var(--line);}
  .drawer-body{padding:20px 22px;overflow-y:auto;flex:1;}

  /* ── PROG ── */
  .prog-wrap{margin:8px 0;}
  .prog-header{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;}
  .prog-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:3px;}
  .prog-fill.hf{background:var(--teal-500);}
  .prog-fill.gd{background:var(--amber);}

  /* ── LOADING ── */
  .loading{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<!-- DRAWER -->
<div class="scrim" id="scrim" onclick="cerrarDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div class="dt" id="dw-title">—</div>
      <div class="ds" id="dw-sub">—</div>
    </div>
    <button class="dclose" onclick="cerrarDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="dw-body"></div>
</aside>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand"><span>CRONO</span><span>RIEGO</span></div>
  <div class="topbar-right">
    <span class="topbar-date" id="top-fecha">—</span>
    <span class="topbar-semana" id="top-semana">—</span>
    <button class="user-btn" onclick="logout()">
      <div class="user-avatar" id="user-ini">—</div>
      <span id="user-email">—</span>
      <i class="ti ti-logout" style="font-size:14px;color:var(--muted)"></i>
    </button>
  </div>
</div>

<!-- SELECTORS -->
<div class="selectors">
  <div class="sel-group">
    <span class="sel-label">Predio</span>
    <select id="sel-predio" onchange="onPredioChange()"><option>Cargando...</option></select>
  </div>
  <div class="sel-group">
    <span class="sel-label">Equipo</span>
    <select id="sel-equipo" onchange="onEquipoChange()"><option>Cargando...</option></select>
  </div>
  <div class="sel-group">
    <span class="sel-label">Zona</span>
    <select id="sel-zona" onchange="onZonaChange()"><option>Cargando...</option></select>
  </div>
  <div class="ndvi-chip" id="ndvi-chip">NDVI —</div>
</div>

<!-- MAIN -->
<div class="main" id="main-content">
  <div class="loading"><i class="ti ti-loader" style="font-size:28px"></i><br><br>Cargando datos...</div>
</div>

<script>
const SUPABASE_URL = 'https://lmexinxdmkgexpthuosn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtZXhpbnhkbWtnZXhwdGh1b3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjgzMTQsImV4cCI6MjA5NTQwNDMxNH0.NiC1H1gDEKNbjob6XGGMu8Zaf2b4uLZLOuKzwioBgS0';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let _zona = null, _rec = null, _scDia = null;
let allData = {};

// ── HELPERS ──────────────────────────────────────────────────────────────────
function hm(h) {
  if (!h || h <= 0) return '—';
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return mm === 60 ? `${hh+1}h 00min` : `${hh}h ${String(mm).padStart(2,'0')}min`;
}
function n2(v, dec=1, suf='') {
  const f = parseFloat(v);
  return isNaN(f) ? '—' : f.toFixed(dec) + suf;
}
function isoWeek(d) {
  const dc = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dc.setUTCDate(dc.getUTCDate()+4-(dc.getUTCDay()||7));
  const y = new Date(Date.UTC(dc.getUTCFullYear(),0,1));
  return Math.ceil(((dc-y)/86400000+1)/7);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function checkAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return null; }
  return session;
}
async function logout() {
  await db.auth.signOut();
  window.location.href = 'login.html';
}

// ── DRAWER ───────────────────────────────────────────────────────────────────
function abrirDrawer(titulo, sub, html) {
  document.getElementById('dw-title').textContent = titulo;
  document.getElementById('dw-sub').textContent = sub;
  document.getElementById('dw-body').innerHTML = html;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function cerrarDrawer() {
  document.getElementById('scrim').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarDrawer(); });

// ── FECHA ─────────────────────────────────────────────────────────────────────
function initFecha() {
  const t = new Date();
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('top-fecha').textContent = `${dias[t.getDay()]} ${t.getDate()} de ${meses[t.getMonth()]}`;
  document.getElementById('top-semana').textContent = `Semana ISO ${isoWeek(t)}`;
}

// ── QUERIES ──────────────────────────────────────────────────────────────────
async function cargarPredios(rsId) {
  const { data } = await db.from('v_predios').select('*').eq('id_rs', rsId);
  return data || [];
}
async function cargarEquipos(prId) {
  const { data } = await db.from('v_equipos').select('*').eq('id_predio', prId);
  return data || [];
}
async function cargarZonas(eqId) {
  const { data } = await db.from('v_zonas').select('*').eq('id_equipo', eqId).eq('activa','Sí');
  return data || [];
}
async function cargarEto(prId) {
  const { data } = await db.from('eto_pronostico').select('*')
    .eq('ID Predio', prId).order('Fecha_Pronostico',{ascending:false}).limit(7);
  return data || [];
}
async function cargarNdvi(zId) {
  const { data } = await db.from('ndvi_registros').select('*')
    .eq('ID Zona Relacional (PK)', zId).order('Fecha',{ascending:false}).limit(8);
  return data || [];
}
async function cargarRecomendacion(zId) {
  const { data } = await db.from('v_recomendaciones').select('*')
    .eq('id_zona', zId).order('fecha_calculo',{ascending:false}).limit(1);
  return data?.[0] || null;
}
async function cargarScDiaria(zId) {
  // Últimos 30 días de sc_demanda_hidrica_diaria_zona para la zona actual
  const { data } = await db.from('sc_demanda_hidrica_diaria_zona').select(
    'id_zona,fecha,kc,ndvi,eto_pronostico_mm_dia,etc_pronostico_mm_dia,' +
    'lamina_neta_pronostico_mm_dia,lamina_neta_riego_pronostico_mm,' +
    'tiempo_de_riego_pronostico_horas,calculo_umbral_riego_mm,' +
    'lluvia_pronostico_mm_dia,deficit_hidrico_controlado'
  )
    .eq('id_zona', zId)
    .order('fecha',{ascending:false})
    .limit(60);
  return data || [];
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const session = await checkAuth();
  if (!session) return;
  initFecha();

  const email = session.user.email;
  document.getElementById('user-email').textContent = email.split('@')[0];
  document.getElementById('user-ini').textContent = email[0].toUpperCase();

  const { data: usuarios } = await db.from('v_usuarios').select('*').eq('email', email).limit(1);
  let rsId = usuarios?.[0]?.['id_rs'] || null;

  let predios = [];
  if (rsId) {
    predios = await cargarPredios(rsId);
  } else {
    const { data } = await db.from('v_predios').select('*').limit(20);
    predios = data || [];
  }
  allData.predios = predios;

  const sel = document.getElementById('sel-predio');
  sel.innerHTML = predios.map(p => `<option value="${p['id_predio']}">${p['nombre']}</option>`).join('');
  if (predios.length > 0) await onPredioChange();
}

async function onPredioChange() {
  const prId = document.getElementById('sel-predio').value;
  const equipos = await cargarEquipos(prId);
  allData.equipos = equipos;
  const sel = document.getElementById('sel-equipo');
  sel.innerHTML = equipos.length
    ? equipos.map(e => `<option value="${e['id_equipo']}">${e['nombre']}</option>`).join('')
    : '<option value="">Sin equipos</option>';
  if (equipos.length > 0) await onEquipoChange();
}

async function onEquipoChange() {
  const eqId = document.getElementById('sel-equipo').value;
  const zonas = await cargarZonas(eqId);
  allData.zonas = zonas;
  const sel = document.getElementById('sel-zona');
  sel.innerHTML = zonas.length
    ? zonas.map(z => `<option value="${z['id_zona']}">${z['id_zona']} — ${z['nombre']} (${z['especie']})</option>`).join('')
    : '<option value="">Sin zonas</option>';
  if (zonas.length > 0) await onZonaChange();
}

async function onZonaChange() {
  const zId = document.getElementById('sel-zona').value;
  const prId = document.getElementById('sel-predio').value;
  const zona = allData.zonas?.find(z => z['id_zona'] === zId);
  if (!zona) return;
  _zona = zona;
  document.getElementById('main-content').innerHTML = '<div class="loading"><i class="ti ti-loader" style="font-size:24px"></i><br><br>Cargando zona...</div>';

  const [eto, ndvi, rec, scDia] = await Promise.all([
    cargarEto(prId), cargarNdvi(zId), cargarRecomendacion(zId), cargarScDiaria(zId)
  ]);

  _rec = rec; _scDia = scDia;

  const ndviActual = ndvi[0];
  if (ndviActual) {
    document.getElementById('ndvi-chip').textContent = `NDVI ${ndviActual['NDVI']} · Kc ${rec?.kc_ajustado ? parseFloat(rec.kc_ajustado).toFixed(2) : '—'}`;
  }

  renderDashboard(zona, eto, ndvi, rec, scDia);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderDashboard(zona, eto, ndvi, rec, scDia) {
  // Datos ETo acumulados
  const etoAcum = eto.reduce((s,e) => s + (parseFloat(e['ETo_Proyectada (mm)'])||0), 0);
  const precipAcum = eto.reduce((s,e) => s + (parseFloat(e['Precipitacion_Probable (mm)'])||0), 0);
  const tmaxProm = eto.length ? eto.reduce((s,e)=>s+(parseFloat(e['Tmax_Proy (C)'])||0),0)/eto.length : null;
  const tminProm = eto.length ? eto.reduce((s,e)=>s+(parseFloat(e['Tmin_Proy (C)'])||0),0)/eto.length : null;

  // Datos de recomendación
  const kcAj      = parseFloat(rec?.kc_ajustado) || null;
  const etcNeta   = parseFloat(rec?.etc_neta) || null;
  const frec      = parseFloat(rec?.frecuencia_dias) || null;
  const tRiego    = parseFloat(rec?.tiempo_h) || null;
  const consumoEv = parseFloat(rec?.consumo_evento) || null;
  const laminaNeta  = parseFloat(rec?.lamina_neta) || null;
  const laminaUmbral= parseFloat(rec?.lamina_umbral) || null;
  const nMes = parseFloat(rec?.n_mes) || null;
  const pMes = parseFloat(rec?.p_mes) || null;
  const kMes = parseFloat(rec?.k_mes) || null;

  // Datos sc_demanda_hidrica_diaria — usar fila más reciente con datos
  const scHoy = scDia?.find(r => parseFloat(r.tiempo_de_riego_pronostico_horas) > 0) || scDia?.[0];
  const tRiegoSc = parseFloat(scHoy?.tiempo_de_riego_pronostico_horas) || tRiego;
  const laminaRiegoSc = parseFloat(scHoy?.lamina_neta_riego_pronostico_mm) || null;
  const umbralSc = parseFloat(scHoy?.calculo_umbral_riego_mm) || laminaUmbral;
  const deficitCtrl = parseFloat(scHoy?.deficit_hidrico_controlado) || null;

  // Balance hídrico: % de umbral consumido
  const etcDiaria = parseFloat(scHoy?.etc_pronostico_mm_dia) || etcNeta || 0;
  const diasDesdeRiego = frec ? Math.min(frec, (frec * (1 - (laminaRiegoSc || 0) / (laminaNeta || 1)))) : null;
  const consumoAcum = etcDiaria * (diasDesdeRiego || (frec ? frec * 0.7 : 5));
  const pctUmbral = umbralSc ? Math.min(100, Math.round(consumoAcum / umbralSc * 100)) : 0;

  // ¿Riega hoy?
  const riegaHoy = scDia?.some(r => {
    const f = new Date(r.fecha);
    const hoy = new Date();
    return f.toDateString() === hoy.toDateString() && parseFloat(r.tiempo_de_riego_pronostico_horas) > 0;
  });
  const hayFerti = !!(nMes || pMes || kMes);

  // Fenología (misma lógica que antes)
  const FENO = {
    'Nogales':{etapa:'Dormancia / inicio brotación',hf:420,hfReq:'700-1000',gd:180},
    'Nogal':{etapa:'Dormancia / inicio brotación',hf:420,hfReq:'700-1000',gd:180},
    'Cerezo':{etapa:'Post-cosecha / inducción floral',hf:510,hfReq:'800-1200',gd:210},
    'Ciruelos':{etapa:'Dormancia',hf:380,hfReq:'600-900',gd:155},
    'Ciruelo':{etapa:'Dormancia',hf:380,hfReq:'600-900',gd:155},
    'Avellano Europeo':{etapa:'Floración / cuaje',hf:890,hfReq:'1000-1400',gd:320},
    'Avellanos':{etapa:'Dormancia',hf:420,hfReq:'1000-1400',gd:160},
    'Manzano':{etapa:'Floración / cuaje',hf:750,hfReq:'800-1200',gd:290},
  };
  const fen = FENO[zona['especie']] || {etapa:'Desarrollo activo',hf:null,hfReq:null,gd:0};
  const hfPct = fen.hf && fen.hfReq ? Math.min(100, Math.round(fen.hf/parseFloat(fen.hfReq)*100)) : 0;

  // Alertas
  const alertas = [];
  if (precipAcum > 10) alertas.push({t:'info',m:`${precipAcum.toFixed(1)} mm de lluvia probable esta semana — considera reducir el riego.`});
  if (ndvi.length >= 2) {
    const n1 = parseFloat(ndvi[0]['NDVI']), n2 = parseFloat(ndvi[1]['NDVI']);
    if (n2 > 0 && (n1-n2)/n2*100 < -10) alertas.push({t:'warn',m:`NDVI bajó ${(Math.abs((n1-n2)/n2*100)).toFixed(1)}% vs semana anterior — revisa el estado del cultivo.`});
  }
  if (!zona['superficie_ha']) alertas.push({t:'warn',m:'Superficie no ingresada — los cálculos de consumo pueden ser inexactos.'});
  if (alertas.length === 0) alertas.push({t:'ok',m:'Sin alertas activas para esta zona.'});

  const riegos = frec ? Math.max(1, Math.round(7/frec)) : 0;

  document.getElementById('main-content').innerHTML = `

    <!-- HERO -->
    <div class="hero">
      <div class="hero-eyebrow">Hoy en tu zona — ${zona['id_zona']} · ${zona['especie']} ${zona['variedad']||''}</div>
      <div class="hero-main">
        <div class="hero-verb">${riegaHoy ? `Riega ${hm(tRiegoSc)}` : (frec ? `Próximo riego en ${Math.round(frec)} días` : 'Sin datos de riego')}</div>
        <div class="hero-tags">
          ${laminaRiegoSc ? `<span class="htag">💧 Repone ${laminaRiegoSc.toFixed(1)} mm</span>` : ''}
          ${hayFerti && riegaHoy ? `<span class="htag ferti">🧪 Aplica fertirriego</span>` : ''}
        </div>
      </div>
      <p class="hero-sub">
        ${riegaHoy
          ? `Tu ${(zona['especie']||'cultivo').toLowerCase()} necesita reposición de humedad. Riega <strong>${hm(tRiegoSc)}</strong> para cubrir la demanda de la semana.${hayFerti ? ' Hoy toca fertirriego — carga la dosis al inicio del evento.' : ''}`
          : `El suelo tiene reserva suficiente. ETc diaria: <strong>${n2(etcDiaria,2)} mm/día</strong>. Monitorea la próxima semana.`
        }
      </p>
      <div class="hero-meta">
        <div class="hm-item"><div class="hm-val">${consumoEv ? consumoEv.toFixed(1)+' m³' : '—'}</div><div class="hm-label">Agua / evento</div></div>
        <div class="hm-item"><div class="hm-val">${n2(etcDiaria,2)} mm/d</div><div class="hm-label">ETc neta diaria</div></div>
        <div class="hm-item"><div class="hm-val">c/ ${frec ? frec.toFixed(0) : '—'} días</div><div class="hm-label">Frecuencia</div></div>
        <div class="hm-item"><div class="hm-val">${etoAcum.toFixed(1)} mm</div><div class="hm-label">ETo 7 días</div></div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Kc ajustado</div><div class="kpi-val green">${n2(kcAj,3)}</div></div>
      <div class="kpi"><div class="kpi-label">Lámina neta</div><div class="kpi-val teal">${n2(laminaNeta,1)}<span style="font-size:12px;color:var(--muted)"> mm</span></div></div>
      <div class="kpi"><div class="kpi-label">Lámina umbral</div><div class="kpi-val amber">${n2(umbralSc,1)}<span style="font-size:12px;color:var(--muted)"> mm</span></div></div>
      <div class="kpi"><div class="kpi-label">ETo 7 días</div><div class="kpi-val">${n2(etoAcum,1)}<span style="font-size:12px;color:var(--muted)"> mm</span></div></div>
      <div class="kpi"><div class="kpi-label">Tiempo de riego</div><div class="kpi-val green">${hm(tRiegoSc)}</div><div class="kpi-unit">${riegos} riego${riegos!==1?'s':''}/sem</div></div>
      <div class="kpi"><div class="kpi-label">Lluvia probable</div><div class="kpi-val">${n2(precipAcum,1)}<span style="font-size:12px;color:var(--muted)"> mm</span></div></div>
    </div>

    <!-- GRID 3 -->
    <div class="grid-3">

      <!-- Calendario -->
      <div class="card">
        <div class="card-title"><i class="ti ti-calendar"></i>Calendario — ${new Date().toLocaleString('es-CL',{month:'long',year:'numeric'})}</div>
        ${renderCalendario(frec, tRiegoSc, hayFerti, zona, rec, scDia)}
        <div class="cal-legend">
          <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--green-50);border:1px solid rgba(30,132,73,.3)"></div>Riego</div>
          <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--teal-50);border:1px solid rgba(46,134,171,.3)"></div>Riego + Ferti</div>
        </div>
      </div>

      <!-- Estado de riego -->
      <div class="card">
        <div class="card-title"><i class="ti ti-droplet"></i>Estado de riego</div>
        <div class="metric-row"><span class="metric-key">Kc ajustado</span><span class="metric-val green">${n2(kcAj,3)}</span></div>
        <div class="metric-row"><span class="metric-key">ETc neta</span><span class="metric-val">${n2(etcNeta,2)} mm/día</span></div>
        <div class="metric-row"><span class="metric-key">Tmax / Tmin</span><span class="metric-val">${tmaxProm ? tmaxProm.toFixed(1)+'° / '+tminProm.toFixed(1)+'°C' : '—'}</span></div>
        <div class="metric-row"><span class="metric-key">Lámina neta</span><span class="metric-val">${n2(laminaNeta,1)} mm</span></div>
        <div class="metric-row"><span class="metric-key">Lámina umbral</span><span class="metric-val amber">${n2(umbralSc,1)} mm</span></div>
        <div class="metric-row"><span class="metric-key">Frecuencia</span><span class="metric-val">${frec ? frec.toFixed(1)+' días' : '—'}</span></div>
        <div class="metric-row"><span class="metric-key">Consumo / evento</span><span class="metric-val">${consumoEv ? consumoEv.toFixed(1)+' m³' : '—'}</span></div>
        <div class="metric-row"><span class="metric-key">Superficie</span><span class="metric-val">${zona['superficie_ha']||'—'} ha</span></div>
        <!-- Balance hídrico -->
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line);">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Balance hídrico</div>
          <div class="bal-track"><div class="bal-fill" id="bal-fill" style="width:0%"></div></div>
          <div class="bal-scale"><span>0 mm</span><span>Umbral ${n2(umbralSc,1)} mm</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:6px">${consumoAcum.toFixed(1)} mm consumidos (${pctUmbral}% del umbral)</div>
        </div>
      </div>

      <!-- Fenología + NDVI -->
      <div class="card">
        <div class="card-title"><i class="ti ti-plant"></i>Fenología y NDVI</div>
        <div style="font-size:14px;font-weight:700;color:var(--green-700);margin-bottom:4px">${fen.etapa}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${zona['especie']||'—'} ${zona['variedad']||''}</div>
        ${fen.hf ? `
          <div class="prog-wrap">
            <div class="prog-header"><span>Horas frío</span><span>${fen.hf} hf</span></div>
            <div class="prog-bar"><div class="prog-fill hf" style="width:${hfPct}%"></div></div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">Req: ${fen.hfReq} hf</div>
          </div>` : ''}
        <div class="metric-row" style="margin-top:10px"><span class="metric-key">NDVI actual</span><span class="metric-val green">${ndvi[0] ? parseFloat(ndvi[0]['NDVI']).toFixed(3) : '—'}</span></div>
        <div class="metric-row"><span class="metric-key">Fecha NDVI</span><span class="metric-val">${ndvi[0]?.['Fecha'] || '—'}</span></div>
        ${renderNdviChart(ndvi)}
      </div>
    </div>

    <!-- GRID 2 -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title"><i class="ti ti-leaf"></i>Nutrición — ${new Date().toLocaleString('es-CL',{month:'long'})}</div>
        ${nMes || pMes || kMes ? `
          <div style="font-size:12px;background:var(--green-50);color:var(--green-900);padding:6px 10px;border-radius:6px;margin-bottom:12px;border:1px solid rgba(30,132,73,.2)">✓ Fertirriego activo este mes</div>
          <div class="nut-grid">
            <div class="nut-item nut-N"><div class="nut-label">Nitrógeno N</div><div class="nut-val">${n2(nMes,1)}</div><div class="nut-unit">kg/zona</div></div>
            <div class="nut-item nut-P"><div class="nut-label">P₂O₅</div><div class="nut-val">${n2(pMes,1)}</div><div class="nut-unit">kg/zona</div></div>
            <div class="nut-item nut-K"><div class="nut-label">K₂O</div><div class="nut-val">${n2(kMes,1)}</div><div class="nut-unit">kg/zona</div></div>
          </div>` : `<div style="font-size:13px;color:var(--muted)">Sin recomendación de nutrición para esta zona.</div>`}
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-bell"></i>Alertas</div>
        ${alertas.map(a => `
          <div class="alerta ${a.t}">
            <i class="ti ti-${a.t==='ok'?'check':a.t==='info'?'info-circle':'alert-triangle'}"></i>
            <span>${a.m}</span>
          </div>`).join('')}
      </div>
    </div>
  `;

  // Animar barra balance
  setTimeout(() => {
    const el = document.getElementById('bal-fill');
    if (el) el.style.width = pctUmbral + '%';
  }, 200);
}

function renderCalendario(frec, tRiego, hayFerti, zona, rec, scDia) {
  const today = new Date();
  const mes = today.getMonth(), año = today.getFullYear();
  const diasMes = new Date(año, mes+1, 0).getDate();
  const primerDia = new Date(año, mes, 1).getDay();
  const offset = primerDia === 0 ? 6 : primerDia - 1;

  // Días de riego desde sc_demanda_hidrica_diaria_zona
  const riegoDias = new Set();
  if (scDia) {
    scDia.forEach(r => {
      if (parseFloat(r.tiempo_de_riego_pronostico_horas) > 0 || parseFloat(r.lamina_neta_riego_pronostico_mm) > 0) {
        const f = new Date(r.fecha);
        if (f.getMonth() === mes && f.getFullYear() === año) riegoDias.add(f.getDate());
      }
    });
  }
  // Fallback: calcular desde frecuencia si sc_demanda no tiene datos del mes
  if (riegoDias.size === 0 && frec && frec > 0) {
    for (let d = today.getDate(); d <= diasMes; d += Math.round(frec)) riegoDias.add(d);
    for (let d = today.getDate() - Math.round(frec); d >= 1; d -= Math.round(frec)) riegoDias.add(d);
  }

  const diasSem = ['L','M','X','J','V','S','D'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  let html = `<div class="cal-grid"><div></div>${diasSem.map(d=>`<div class="cal-dh">${d}</div>`).join('')}`;

  let dia = 1 - offset;
  for (let s = 0; s < 5; s++) {
    const fw = new Date(año, mes, Math.max(1, dia+offset));
    html += `<div class="cal-wn">${isoWeek(fw)}</div>`;
    for (let d = 0; d < 7; d++, dia++) {
      const ok = dia >= 1 && dia <= diasMes;
      const esHoy = dia === today.getDate() && ok;
      const esR = ok && riegoDias.has(dia);
      const esF = esR && hayFerti;
      const esFuturo = ok && dia >= today.getDate();
      let cls = 'cal-cell'+((!ok)?' otro-mes':'')+(esHoy?' hoy':'')+(esF?' ferti':esR?' riego':'')+(esR?' cal-clickable':'');
      const fechaStr = ok ? `${dia} de ${meses[mes]}` : '';
      html += `<div class="${cls}" ${esR && ok ? `onclick="abrirDetalleCalendario(${dia},'${fechaStr}',${esF},${esFuturo})"` : ''}>
        <div class="cal-dn">${ok?dia:''}</div>
        ${esR?`<div class="cal-ev">${hm(tRiego)}</div>`:''}
        ${esF?`<div class="cal-fe">Ferti</div>`:''}
      </div>`;
    }
  }
  html += '</div>';
  return html;
}

function abrirDetalleCalendario(dia, fechaStr, hayFerti, esFuturo) {
  const rec = _rec, zona = _zona;
  const tHmin  = rec?.tiempo_hmin || hm(parseFloat(rec?.tiempo_h));
  const consumo = rec?.consumo_evento ? parseFloat(rec.consumo_evento).toFixed(1)+' m³' : '—';
  const freq   = rec?.frecuencia_dias ? parseFloat(rec.frecuencia_dias).toFixed(1) : '—';
  const ibruta = rec?.i_bruta ? parseFloat(rec.i_bruta).toFixed(2)+' mm/h' : '—';
  const camino = rec?.camino || '—';
  const nMes = parseFloat(rec?.n_mes) || null;
  const pMes = parseFloat(rec?.p_mes) || null;
  const kMes = parseFloat(rec?.k_mes) || null;
  const tipo  = esFuturo ? 'Próximo riego' : 'Riego ejecutado';

  const html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
      <div style="width:46px;height:46px;border-radius:50%;background:var(--teal-700);color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-size:20px;font-weight:700;flex:none">${dia}</div>
      <div>
        <div style="font-weight:700;font-size:15px">${fechaStr}</div>
        <div style="font-size:12px;color:var(--muted)">${tipo} · ${zona?.especie||''} ${zona?.variedad||''}</div>
      </div>
    </div>
    <div style="background:var(--teal-50);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-700);margin-bottom:10px">Instrucción de riego</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><div style="font-size:11px;color:var(--muted)">Tiempo</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--teal-700)">${tHmin}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Consumo</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--teal-700)">${consumo}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Frecuencia</div><div style="font-size:14px;font-weight:600">Cada ${freq} días</div></div>
        <div><div style="font-size:11px;color:var(--muted)">I. Bruta</div><div style="font-size:14px;font-weight:600">${ibruta}</div></div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">Sistema</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:16px">${camino}</div>
    ${hayFerti && (nMes||pMes||kMes) ? `
    <div style="background:var(--green-50);border-radius:10px;padding:14px;border:1px solid rgba(30,132,73,.2);">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green-700);margin-bottom:10px">🌿 Carga de fertirriego</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
        <div><div style="font-size:10px;color:var(--muted)">N</div><div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#185FA5">${n2(nMes,1)}</div><div style="font-size:10px;color:var(--muted)">kg/zona</div></div>
        <div><div style="font-size:10px;color:var(--muted)">P₂O₅</div><div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#854F0B">${n2(pMes,1)}</div><div style="font-size:10px;color:var(--muted)">kg/zona</div></div>
        <div><div style="font-size:10px;color:var(--muted)">K₂O</div><div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--green-700)">${n2(kMes,1)}</div><div style="font-size:10px;color:var(--muted)">kg/zona</div></div>
      </div>
    </div>` : ''}
  `;

  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  abrirDrawer(`${['domingo','lunes','martes','miércoles','jueves','viernes','sábado'][new Date(new Date().getFullYear(),new Date().getMonth(),dia).getDay()]} ${dia}`, `${zona?.id_zona||''} · ${zona?.especie||''} ${zona?.variedad||''}`, html);
}

function renderNdviChart(ndvi) {
  if (!ndvi || ndvi.length < 2) return '';
  const vals = ndvi.slice(0,6).reverse();
  const max = Math.max(...vals.map(v => parseFloat(v['NDVI'])||0));
  return `<div style="margin-top:12px;font-size:10px;color:var(--muted);margin-bottom:4px">NDVI histórico</div>
    <div class="ndvi-chart">
      ${vals.map(v => {
        const pct = max > 0 ? (parseFloat(v['NDVI'])/max*100) : 0;
        return `<div class="ndvi-bar-wrap">
          <div class="ndvi-bar-item" style="height:${pct}%"></div>
          <div class="ndvi-date">${v['Fecha']?.toString().slice(5)||''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

init();
</script>
</body>
</html>
