<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CronoRiego · Fertirriego</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">

<style>
:root{
  --z0:#2563EB;--z0l:#EFF6FF;--z1:#16A34A;--z1l:#F0FDF4;--z2:#EA580C;--z2l:#FFF7ED;
  --z3:#7C3AED;--z3l:#F5F3FF;--z4:#0891B2;--z4l:#ECFEFF;--z5:#DC2626;--z5l:#FEF2F2;
  --ink:#0F172A;--ink2:#334155;--muted:#64748B;--subtle:#94A3B8;
  --line:#E2E8F0;--line2:#F1F5F9;--bg:#F8FAFC;--white:#FFFFFF;
  --blue:#2563EB;--green:#16A34A;--amber:#D97706;--red:#DC2626;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);--shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --r-sm:8px;--r:12px;--r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.hdr{height:56px;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:50;box-shadow:var(--shadow-sm);}
.logo{font-weight:800;font-size:16px;letter-spacing:-.3px;white-space:nowrap;}
.hdr-sep{width:1px;height:24px;background:var(--line);}
.hdr-filters{display:flex;align-items:center;gap:8px;flex:1;}
.sel-wrap{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--line);border-radius:var(--r-sm);}
.sel-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--subtle);}
.sel-wrap select{border:none;outline:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--ink);background:transparent;cursor:pointer;max-width:150px;}
.week-nav{display:flex;align-items:center;gap:8px;padding:5px 10px;border:1px solid var(--line);border-radius:var(--r-sm);font-size:12px;font-weight:600;white-space:nowrap;}
.week-nav button{border:none;background:none;cursor:pointer;color:var(--subtle);display:flex;padding:2px;border-radius:4px;}
.week-nav button:hover{background:var(--line2);color:var(--ink);}
.hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.sem-badge{background:#EFF6FF;color:#1d4ed8;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid #BFDBFE;}
.usr-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--line);border-radius:var(--r-sm);cursor:pointer;}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#0891B2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.usr-name{font-size:12px;font-weight:500;color:var(--ink2);}
.tabs{height:42px;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:stretch;padding:0 20px;gap:2px;flex-shrink:0;}
.tab{display:flex;align-items:center;gap:7px;padding:0 15px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab i{font-size:16px;}.tab:hover{color:var(--ink2);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--white);border-bottom:1px solid var(--line);flex-shrink:0;}
.kpi-card{padding:14px 18px;border-right:1px solid var(--line);display:flex;align-items:center;gap:13px;}
.kpi-card:last-child{border-right:none;}
.kpi-ico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.kpi-body{display:flex;flex-direction:column;gap:2px;min-width:0;}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--subtle);}
.kpi-val{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1.05;letter-spacing:-.5px;}
.kpi-val.sm{font-size:19px;}
.kpi-sub{font-size:11px;color:var(--muted);}
.body{display:flex;flex:1;overflow:hidden;min-height:0;}
.cal-zone{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.cal-scroll{flex:1;overflow:auto;padding:12px 16px 0;}
.cal-tbl{width:100%;border-collapse:separate;border-spacing:0 5px;min-width:740px;}
.cal-tbl thead th{padding:0 8px 11px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center;border-bottom:2px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:10;}
.cal-tbl thead th.th-zona{text-align:left;min-width:150px;}
.cal-tbl thead th.th-hoy{color:var(--blue);}
.cal-tbl thead th .th-num{font-family:'Fraunces',serif;font-size:19px;font-weight:700;display:block;line-height:1;}
.zona-td{padding:3px 6px 3px 0;width:160px;}
.zona-pill{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:10px 13px;height:84px;display:flex;flex-direction:column;justify-content:center;gap:3px;box-shadow:var(--shadow-sm);}
.zona-head{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;}
.zona-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.zona-esp{font-size:11px;color:var(--muted);padding-left:16px;line-height:1.35;}
.dia-td{padding:3px;vertical-align:top;min-width:108px;}
.dia-inner{height:84px;display:flex;align-items:center;justify-content:center;}
.dia-td.hoy-col .ferti-card{box-shadow:0 0 0 2px var(--blue),var(--shadow-md);}
.ferti-card{width:100%;height:84px;border-radius:var(--r);padding:9px 11px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow);position:relative;overflow:hidden;border:1.5px solid transparent;}
.ferti-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.fc-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.fc-dosis{font-family:'Fraunces',serif;font-size:18px;font-weight:700;line-height:1;letter-spacing:-.3px;display:flex;align-items:center;gap:4px;}
.fc-dosis span{font-size:11px;font-weight:600;color:var(--muted);font-family:'Inter';}
.fc-prod{font-size:11px;font-weight:600;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fc-foot{display:flex;align-items:center;justify-content:space-between;}
.fc-time{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.dia-empty{width:100%;height:84px;}
.franja{background:var(--white);border-top:2px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);box-shadow:0 -2px 12px rgba(0,0,0,.06);flex-shrink:0;}
.franja-card{padding:12px 16px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:8px;}
.franja-card:last-child{border-right:none;}
.franja-top{display:flex;align-items:center;gap:7px;}
.franja-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.franja-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--subtle);}
.nut-grid{display:flex;align-items:flex-end;gap:11px;flex-wrap:wrap;}
.nut-c{display:flex;flex-direction:column;gap:1px;}
.nut-k{font-size:9px;font-weight:700;text-transform:uppercase;}
.nut-v{font-size:13px;font-weight:700;color:var(--ink2);white-space:nowrap;}
.nut-v small{font-size:10px;font-weight:500;color:var(--muted);}
.nut-more{font-size:10px;color:var(--subtle);align-self:flex-end;padding-bottom:1px;}
.franja-big{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1;letter-spacing:-.4px;}
.franja-sub{font-size:11px;color:var(--muted);}
.panel{width:330px;border-left:1px solid var(--line);background:var(--bg);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.p-block{padding:15px 16px;border-bottom:1px solid var(--line);background:var(--white);}
.p-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:5px;}
.p-title i{font-size:14px;}
.bn-row{display:grid;grid-template-columns:34px 1fr 38px 52px;align-items:center;gap:8px;margin-bottom:9px;}
.bn-row:last-child{margin-bottom:0;}
.bn-k{font-size:11px;font-weight:700;}
.bn-track{height:6px;border-radius:4px;background:var(--line2);position:relative;overflow:hidden;}
.bn-fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;}
.bn-over{position:absolute;top:0;bottom:0;right:0;border-radius:0 4px 4px 0;background:repeating-linear-gradient(45deg,var(--red),var(--red) 2px,#fff5 2px,#fff5 4px);}
.bn-pct{font-size:11px;font-weight:700;color:var(--ink2);text-align:right;font-variant-numeric:tabular-nums;}
.bn-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-align:center;}
.bn-tag.exc{background:#FFF7ED;color:var(--z2);}
.bn-tag.def{background:#FEFCE8;color:#A16207;}
.alerta-card{border-radius:var(--r-sm);padding:9px 11px;margin-bottom:8px;border:1px solid transparent;display:flex;gap:9px;align-items:flex-start;}
.alerta-card:last-child{margin-bottom:0;}
.alerta-card.warn{background:#FFF7ED;border-color:#FED7AA;}
.alerta-card.def{background:#FEFCE8;border-color:#FEF08A;}
.alerta-card.ok{background:#F0FDF4;border-color:#BBF7D0;}
.alerta-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.alerta-t{font-size:12px;font-weight:700;line-height:1.3;color:var(--ink);}
.alerta-s{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35;}
.prox-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2);align-items:center;}
.prox-item:last-child{border-bottom:none;padding-bottom:0;}
.prox-body{flex:1;min-width:0;}
.prox-zona{font-size:13px;font-weight:700;}
.prox-prod{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.prox-r{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.prox-dosis{font-size:13px;font-weight:700;}
.prox-fecha{font-size:10px;color:var(--subtle);}
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);}
.scrim.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;right:0;top:0;height:100%;width:min(560px,94vw);background:var(--white);z-index:301;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.12);}
.drawer.open{transform:translateX(0);}
.dh{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.dt{font-family:'Fraunces',serif;font-size:19px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:7px;}
.ds{font-size:12px;color:var(--muted);margin-top:3px;}
.dh-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.dh-date{font-size:11px;color:var(--subtle);text-align:right;line-height:1.4;}
.dclose{border:none;background:var(--line2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--muted);display:grid;place-items:center;}
.dclose:hover{background:var(--line);}
.db{padding:16px 22px;overflow-y:auto;flex:1;}
.dcols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dcard{border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:14px;}
.dcard-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--subtle);margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.dprod{font-family:'Fraunces',serif;font-size:20px;font-weight:700;line-height:1.1;}
.dprod-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.naport{display:flex;gap:6px;flex-wrap:wrap;}
.naport-c{flex:1;min-width:48px;text-align:center;padding:7px 4px;border-radius:7px;background:var(--line2);}
.naport-k{font-size:10px;font-weight:700;}
.naport-v{font-family:'Fraunces',serif;font-size:15px;font-weight:700;line-height:1.1;}
.naport-u{font-size:9px;color:var(--muted);}
.iny-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid var(--line2);}
.iny-row:last-child{border-bottom:none;}
.iny-k{color:var(--muted);}.iny-v{font-weight:600;color:var(--ink2);}
.btbl{width:100%;font-size:12px;border-collapse:collapse;}
.btbl th{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--subtle);font-weight:600;text-align:left;padding:0 0 6px;}
.btbl th:last-child{width:64px;}
.btbl td{padding:5px 0;border-top:1px solid var(--line2);}
.btbl td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.mini-track{height:5px;border-radius:3px;background:var(--line2);position:relative;overflow:hidden;}
.mini-fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px;}
.mini-over{position:absolute;top:0;bottom:0;right:0;background:repeating-linear-gradient(45deg,var(--red),var(--red) 2px,#fff5 2px,#fff5 4px);border-radius:0 3px 3px 0;}
.reco{background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--r);padding:12px;display:flex;gap:9px;}
.reco-t{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.reco-s{font-size:11px;color:var(--ink2);line-height:1.45;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:8px;font-size:12px;}
@media(max-width:1100px){.panel{display:none;}.kpi-bar{grid-template-columns:repeat(2,1fr);}.franja{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body><div class="app">
<div class="scrim" id="scrim" onclick="closeD()"></div>

  <div class="dh"><div><div class="dt" id="dt"></div><div class="ds" id="ds"></div></div>

<header class="hdr">
  <div class="logo"><span style="color:#1A5276">CRONO</span><span style="color:#1E8449">RIEGO</span></div>

    <div class="sel-wrap"><span class="sel-lbl">Predio</span><select id="sp" onchange="onPredio()"></select></div>

    <div class="week-nav"><button onclick="chW(-1)"><i class="ti ti-chevron-left"></i></button><span id="wlbl">Semana —</span><button onclick="chW(1)"><i class="ti ti-chevron-right"></i></button></div>

  </div>

<div class="tabs">

</div>

  <div class="cal-zone">

    <div class="p-block" id="pbal"></div>

<script>
const SU='https://lmexinxdmkgexpthuosn.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtZXhpbnhkbWtnZXhwdGh1b3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjgzMTQsImV4cCI6MjA5NTQwNDMxNH0.NiC1H1gDEKNbjob6XGGMu8Zaf2b4uLZLOuKzwioBgS0';
const {createClient}=supabase;const db=createClient(SU,SK);

const ZC=['#2563EB','#16A34A','#EA580C','#7C3AED','#0891B2','#DC2626'];
const ZL=['#EFF6FF','#F0FDF4','#FFF7ED','#F5F3FF','#ECFEFF','#FEF2F2'];
const DSS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MSS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
// nutrientes: macros (aplicado/demanda) + micros (actual/objetivo ppm)
const MACRO=[{k:'N',c:'#2563EB',dem:'demanda_neta_n_kg_zona',acc:'acumulado_n_kg',ap:'n_aplicado_kg'},
  {k:'P₂O₅',c:'#EA580C',dem:'demanda_neta_p2o5_kg_zona',acc:'acumulado_p2o5_kg',ap:'p2o5_aplicado_kg'},
  {k:'K₂O',c:'#7C3AED',dem:'demanda_neta_k2o_kg_zona',acc:'acumulado_k2o_kg',ap:'k2o_aplicado_kg'}];
const MICRO=[{k:'Ca',c:'#0891B2',p:'ca'},{k:'Mg',c:'#16A34A',p:'mg'},{k:'S',c:'#CA8A04',p:'s'},
  {k:'Zn',c:'#DB2777',p:'zn'},{k:'Mn',c:'#92400E',p:'mn'},{k:'Fe',c:'#DC2626',p:'fe'},
  {k:'Cu',c:'#B45309',p:'cu'},{k:'B',c:'#0D9488',p:'b'}];

let G={rsId:null,zonas:[],ferti:[],bal:{},off:0};
const num=v=>{const n=parseFloat(v);return isNaN(n)?0:n;};
const fs=d=>d.toISOString().slice(0,10);
function lunes(o=0){const h=new Date();const dw=h.getDay()||7;const l=new Date(h);l.setDate(h.getDate()-(dw-1)+o*7);l.setHours(0,0,0,0);return l;}
function semDias(o=0){const l=lunes(o);return Array.from({length:7},(_,i)=>{const d=new Date(l);d.setDate(l.getDate()+i);return d;});}
function isoW(d){const c=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));c.setUTCDate(c.getUTCDate()+4-(c.getUTCDay()||7));const y=new Date(Date.UTC(c.getUTCFullYear(),0,1));return Math.ceil(((c-y)/86400000+1)/7);}
function hm(h){const f=num(h);if(f<=0)return null;const hh=Math.floor(f),mm=Math.round((f-hh)*60);return mm===60?`${hh+1}h 00`:`${hh}h ${String(mm).padStart(2,'0')}`;}
function prodShort(p){if(!p)return '—';const m=p.match(/\d{1,2}-\d{1,2}-\d{1,2}/);return m?m[0]:p.split('(')[0].trim().slice(0,16);}
function prodColor(p){const s=prodShort(p);return s.startsWith('20-13')?'#1d4ed8':s.startsWith('15-5')?'#7C3AED':'#0891B2';}

async function chkAuth(){const {data:{session}}=await db.auth.getSession();if(!session){location.href='login.html';return null;}return session;}
async function logout(){await db.auth.signOut();location.href='login.html';}
function chW(d){G.off+=d;updW();if(G.zonas.length)loadRender();}
function updW(){const dias=semDias(G.off);const l=dias[0],dom=dias[6];document.getElementById('wlbl').textContent=`Sem. ${isoW(l)} · ${l.getDate()} ${MSS[l.getMonth()]} — ${dom.getDate()} ${MSS[dom.getMonth()]}`;document.getElementById('sbadge').textContent=G.off===0?'Semana en curso':(G.off>0?'+'+G.off+' sem':G.off+' sem');}

async function init(){
  const ses=await chkAuth();if(!ses)return;updW();
  const em=ses.user.email;document.getElementById('unm').textContent=em.split('@')[0];document.getElementById('uini').textContent=em[0].toUpperCase();
  const {data:u}=await db.from('v_usuarios').select('*').eq('email',em).limit(1);
  G.rsId=u?.[0]?.id_rs||null;
  if(!G.rsId){document.getElementById('ctbl').innerHTML='<tbody><tr><td class="loading" style="color:var(--amber)">Cuenta sin predios asignados.</td></tr></tbody>';return;}
  const {data:ps}=await db.from('v_predios').select('*').eq('id_rs',G.rsId);
  document.getElementById('sp').innerHTML=(ps||[]).map(p=>`<option value="${p.id_predio}">${p.nombre}</option>`).join('');
  if(ps&&ps.length)await onPredio();
}
async function onPredio(){
  const pr=document.getElementById('sp').value;
  const {data:es}=await db.from('v_equipos').select('*').eq('id_predio',pr);
  document.getElementById('se').innerHTML=(es||[]).map(e=>`<option value="${e.id_equipo}">${e.nombre}</option>`).join('')||'<option>Sin equipos</option>';
  if(es&&es.length)await onEquipo();
}
async function onEquipo(){
  const eq=document.getElementById('se').value;
  const {data:zs}=await db.from('v_zonas').select('*').eq('id_equipo',eq).eq('activa','Sí');
  G.zonas=zs||[];
  if(G.zonas.length)await loadRender();
  else document.getElementById('ctbl').innerHTML='<tbody><tr><td class="loading">Equipo sin zonas activas.</td></tr></tbody>';
}
async function loadRender(){
  const znIds=G.zonas.map(z=>z.id_zona);
  const [{data:fe},{data:ba}]=await Promise.all([
    db.from('sc_recomendacion_ferti').select('*').in('id_zona',znIds).order('fecha_evento',{ascending:true}),
    db.from('sc_balance_nutricional').select('*').in('id_zona',znIds)
  ]);
  G.ferti=fe||[];G.bal={};(ba||[]).forEach(r=>G.bal[r.id_zona]=r);
  rKpi();rCal();rFranja();rPanel();
}

// acumulado aplicado por zona (último/máximo de cada acumulado_*)
function accZona(znId,col){const ev=G.ferti.filter(e=>e.id_zona===znId);return ev.length?Math.max(...ev.map(e=>num(e[col]))):0;}
// cobertura por zona de un macro (aplicado acumulado / demanda)
function covMacro(znId,m){const b=G.bal[znId];if(!b)return null;const dem=num(b[m.dem]);if(dem<=0)return null;return accZona(znId,m.acc)/dem*100;}
function covMicro(znId,mi){const b=G.bal[znId];if(!b)return null;const obj=num(b[mi.p+'_objetivo_ppm']);if(obj<=0)return null;return num(b[mi.p+'_actual_ppm'])/obj*100;}

function rKpi(){
  const dias=semDias(G.off);const fi=fs(dias[0]),ff=fs(dias[6]);
  const evSem=G.ferti.filter(e=>e.fecha_evento>=fi&&e.fecha_evento<=ff);
  const kg=evSem.reduce((a,e)=>a+num(e.dosis_aplicar_kg),0);
  // cobertura promedio (macros+micros) sobre zonas con dato
  let cs=[];G.zonas.forEach(z=>{[...MACRO.map(m=>covMacro(z.id_zona,m)),...MICRO.map(mi=>covMicro(z.id_zona,mi))].forEach(v=>{if(v!=null)cs.push(Math.min(v,100));});});
  const cov=cs.length?Math.round(cs.reduce((a,b)=>a+b,0)/cs.length):null;
  // próxima aplicación (fecha_evento >= hoy)
  const hoy=fs(new Date());const fut=G.ferti.filter(e=>e.fecha_evento>=hoy).sort((a,b)=>a.fecha_evento<b.fecha_evento?-1:1);
  const px=fut[0];const pxZ=px?G.zonas.find(z=>z.id_zona===px.id_zona):null;
  const pxd=px?new Date(px.fecha_evento+'T00:00:00'):null;
  document.getElementById('kpib').innerHTML=`
  <div class="kpi-card"><div class="kpi-ico" style="background:#F0FDF4;color:var(--green)"><i class="ti ti-package"></i></div>
    <div class="kpi-body"><div class="kpi-lbl">Producto semana</div><div class="kpi-val">${kg>0?kg.toFixed(0):'—'} <span style="font-size:14px;color:var(--muted)">kg</span></div><div class="kpi-sub">${evSem.length} aplicaciones</div></div></div>
  <div class="kpi-card"><div class="kpi-ico" style="background:#F5F3FF;color:#7C3AED"><i class="ti ti-chart-donut-3"></i></div>
    <div class="kpi-body"><div class="kpi-lbl">Cobertura nutricional</div><div class="kpi-val">${cov!=null?cov+'%':'—'}</div><div class="kpi-sub">promedio del equipo</div></div></div>
  <div class="kpi-card"><div class="kpi-ico" style="background:#EFF6FF;color:var(--blue)"><i class="ti ti-letter-n"></i></div>
    <div class="kpi-body"><div class="kpi-lbl">Aplicaciones temporada</div><div class="kpi-val">${G.ferti.length}</div><div class="kpi-sub">eventos en ${G.zonas.length} zonas</div></div></div>
  <div class="kpi-card"><div class="kpi-ico" style="background:#FFF7ED;color:var(--z2)"><i class="ti ti-calendar-due"></i></div>
    <div class="kpi-body"><div class="kpi-lbl">Próxima aplicación</div><div class="kpi-val sm">${pxZ?(pxZ.nombre||px.id_zona):'—'}</div><div class="kpi-sub">${pxd?DSS[(pxd.getDay()||7)-1]+' '+pxd.getDate()+' '+MSS[pxd.getMonth()]:'sin programar'}</div></div></div>`;
}

function rCal(){
  const dias=semDias(G.off);const hS=fs(new Date());
  const map={};G.ferti.forEach(e=>{(map[e.id_zona]=map[e.id_zona]||{})[e.fecha_evento]=map[e.id_zona][e.fecha_evento]||[];map[e.id_zona][e.fecha_evento].push(e);});
  let th=`<thead><tr><th class="th-zona">Zona</th>${dias.map(d=>{const eh=fs(d)===hS;return`<th class="${eh?'th-hoy':''}"><span class="th-num">${d.getDate()}</span><div style="font-size:10px;margin-top:1px">${DSS[(d.getDay()||7)-1]} ${MSS[d.getMonth()]}</div></th>`;}).join('')}</tr></thead>`;
  let tb='<tbody>';
  G.zonas.forEach((z,i)=>{const c=ZC[i%6],cl=ZL[i%6];
    tb+=`<tr><td class="zona-td"><div class="zona-pill"><div class="zona-head"><span class="zona-dot" style="background:${c}"></span>${z.nombre||z.id_zona}</div>
      <div class="zona-esp">${z.especie||'—'} ${z.variedad||''}<br>${z.superficie_ha||'—'} ha</div></div></td>`;
    dias.forEach(d=>{const dS=fs(d);const eh=dS===hS;const evs=map[z.id_zona]?.[dS];
      if(evs&&evs.length){const e=evs[0];const past=dS<hS;
        tb+=`<td class="dia-td${eh?' hoy-col':''}"><div class="dia-inner">
          <div class="ferti-card" style="background:${cl};border-color:${c}33" onclick="openEv('${z.id_zona}','${dS}',0)">
            <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${c}"></div>
            <div class="fc-top"><span class="fc-dosis" style="color:${c}"><i class="ti ti-flask-2" style="font-size:14px"></i>${num(e.dosis_aplicar_kg).toFixed(1)} <span>kg</span></span>${evs.length>1?`<span style="font-size:10px;font-weight:700;color:${c};background:${cl};border:1px solid ${c}55;border-radius:5px;padding:1px 4px">+${evs.length-1}</span>`:`<i class="ti ti-chevron-right" style="font-size:13px;color:${c}99"></i>`}</div>
            <div class="fc-prod">${prodShort(e.producto_asignado)}</div>
            <div class="fc-foot"><span class="fc-time"><i class="ti ti-clock" style="font-size:11px"></i>${hm(e.tiempo_fertirriego_hrs)||'—'} fert.</span></div>
          </div></div></td>`;
      } else tb+=`<td class="dia-td${eh?' hoy-col':''}"><div class="dia-inner"><div class="dia-empty"></div></div></td>`;
    });
    tb+='</tr>';
  });
  document.getElementById('ctbl').innerHTML=th+tb+(G.ferti.length===0?'<tr><td colspan="8" class="loading" style="color:var(--amber)">No hay aplicaciones cargadas para estas zonas. Navega a otra semana o revisa que el equipo tenga eventos de fertirriego.</td></tr>':'')+'</tbody>';
}

function rFranja(){
  const demT=MACRO.map(m=>G.zonas.reduce((a,z)=>a+num(G.bal[z.id_zona]?.[m.dem]),0));
  const apoT=MACRO.map(m=>G.zonas.reduce((a,z)=>a+accZona(z.id_zona,m.acc),0));
  const restT=demT.map((d,i)=>Math.max(0,d-apoT[i]));
  const ng=(arr)=>`<div class="nut-grid">${MACRO.map((n,i)=>`<div class="nut-c"><div class="nut-k" style="color:${n.c}">${n.k}</div><div class="nut-v">${arr[i].toFixed(1)} <small>kg</small></div></div>`).join('')}<div class="nut-more">+micros</div></div>`;
  // eficiencia = aportado/demanda global (cap 100)
  const sd=demT.reduce((a,b)=>a+b,0),sa=apoT.reduce((a,b)=>a+b,0);
  const ef=sd>0?Math.round(Math.min(sa/sd,1)*100):null;
  document.getElementById('franja').innerHTML=`
  <div class="franja-card"><div class="franja-top"><div class="franja-ico" style="background:#EFF6FF;color:var(--blue)"><i class="ti ti-flask"></i></div><div class="franja-lbl">Demanda total (NPK)</div></div>${ng(demT)}</div>
  <div class="franja-card"><div class="franja-top"><div class="franja-ico" style="background:#F0FDF4;color:var(--green)"><i class="ti ti-circle-check"></i></div><div class="franja-lbl">Aportado (acumulado)</div></div>${ng(apoT)}</div>
  <div class="franja-card"><div class="franja-top"><div class="franja-ico" style="background:#FFF7ED;color:var(--z2)"><i class="ti ti-progress"></i></div><div class="franja-lbl">Demanda restante</div></div>${ng(restT)}</div>
  <div class="franja-card"><div class="franja-top"><div class="franja-ico" style="background:#F0FDF4;color:var(--green)"><i class="ti ti-target-arrow"></i></div><div class="franja-lbl">Eficiencia nutricional</div></div><div class="franja-big" style="color:${ef>=80?'var(--green)':'var(--amber)'}">${ef!=null?ef+'%':'—'}</div><div class="franja-sub">aportado vs demanda</div></div>
  <div class="franja-card"><div class="franja-top"><div class="franja-ico" style="background:#ECFEFF;color:#0891B2"><i class="ti ti-droplet"></i></div><div class="franja-lbl">Producto total temporada</div></div><div class="franja-big">${G.ferti.reduce((a,e)=>a+num(e.dosis_aplicar_kg),0).toFixed(0)}</div><div class="franja-sub">kg aplicados</div></div>`;
}

function rPanel(){
  // balance promedio del equipo
  const avg=(fn)=>{const vs=G.zonas.map(z=>fn(z.id_zona)).filter(v=>v!=null);return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null;};
  let rows=[...MACRO.map(m=>({k:m.k,c:m.c,pct:avg(z=>covMacro(z,m))})),...MICRO.map(mi=>({k:mi.k,c:mi.c,pct:avg(z=>covMicro(z,mi))}))];
  let bh=`<div class="p-title"><i class="ti ti-chart-donut-3"></i>Balance nutricional promedio</div>`;
  rows.forEach(r=>{if(r.pct==null){bh+=`<div class="bn-row"><span class="bn-k" style="color:${r.c}">${r.k}</span><div class="bn-track"></div><span class="bn-pct" style="color:var(--subtle)">s/d</span><span></span></div>`;return;}
    const pct=Math.round(r.pct);const w=Math.min(pct,100);const exc=pct>=110;const def=pct<60;
    bh+=`<div class="bn-row"><span class="bn-k" style="color:${r.c}">${r.k}</span>
      <div class="bn-track"><div class="bn-fill" style="width:${w}%;background:${r.c}"></div>${pct>100?`<div class="bn-over" style="width:${Math.min(pct-100,30)}%"></div>`:''}</div>
      <span class="bn-pct">${pct}%</span><span>${exc?'<span class="bn-tag exc">Exceso</span>':def?'<span class="bn-tag def">Déficit</span>':''}</span></div>`;
  });
  document.getElementById('pbal').innerHTML=bh;

  // alertas dinámicas
  const al=[];
  G.zonas.forEach(z=>{
    MACRO.forEach(m=>{const c=covMacro(z.id_zona,m);if(c!=null&&c>=130)al.push({cls:'warn',ic:'ti-alert-triangle',col:m.c,t:`Exceso de ${m.k} en ${z.nombre||z.id_zona}`,s:`Cobertura ${Math.round(c)}%. Evaluar fórmula con menos ${m.k}.`});});
    MICRO.forEach(mi=>{const c=covMicro(z.id_zona,mi);if(c!=null&&c<60)al.push({cls:'def',ic:'ti-trending-down',col:mi.c,t:`Déficit de ${mi.k} en ${z.nombre||z.id_zona}`,s:`Suelo en ${Math.round(c)}% del objetivo.`});});
  });
  const als=al.slice(0,4);
  document.getElementById('palert').innerHTML=`<div class="p-title"><i class="ti ti-bell"></i>Alertas</div>`+
    (als.length?als.map(a=>`<div class="alerta-card ${a.cls}"><div class="alerta-ico" style="background:${a.col}22;color:${a.col}"><i class="ti ${a.ic}"></i></div><div><div class="alerta-t">${a.t}</div><div class="alerta-s">${a.s}</div></div></div>`).join(''):`<div class="alerta-card ok"><div class="alerta-ico" style="background:#BBF7D0;color:var(--green)"><i class="ti ti-circle-check"></i></div><div><div class="alerta-t">Sin alertas</div><div class="alerta-s">Nutrientes dentro de rango.</div></div></div>`);

  const hoy=fs(new Date());
  const fut=G.ferti.filter(e=>e.fecha_evento>=hoy).sort((a,b)=>a.fecha_evento<b.fecha_evento?-1:1).slice(0,5);
  document.getElementById('pprox').innerHTML=`<div class="p-title"><i class="ti ti-calendar-event"></i>Próximas aplicaciones</div>`+
    (fut.length?fut.map(e=>{const i=G.zonas.findIndex(z=>z.id_zona===e.id_zona);const z=G.zonas[i];const d=new Date(e.fecha_evento+'T00:00:00');
      return `<div class="prox-item"><div class="zona-dot" style="background:${ZC[(i<0?0:i)%6]}"></div><div class="prox-body"><div class="prox-zona">${z?.nombre||e.id_zona}</div><div class="prox-prod">${prodShort(e.producto_asignado)}</div></div>
      <div class="prox-r"><div class="prox-dosis" style="color:${ZC[(i<0?0:i)%6]}">${num(e.dosis_aplicar_kg).toFixed(1)} kg</div><div class="prox-fecha">${DSS[(d.getDay()||7)-1]} ${d.getDate()} ${MSS[d.getMonth()]}</div></div></div>`;}).join(''):'<div style="font-size:11px;color:var(--muted)">Sin aplicaciones futuras programadas.</div>');
}

function openEv(znId,fecha,idx){
  const evs=G.ferti.filter(e=>e.id_zona===znId&&e.fecha_evento===fecha);const e=evs[idx]||evs[0];if(!e)return;
  const i=G.zonas.findIndex(z=>z.id_zona===znId);const z=G.zonas[i];const c=ZC[i%6],cl=ZL[i%6];const b=G.bal[znId];
  const d=new Date(fecha+'T00:00:00');const past=fecha<fs(new Date());
  document.getElementById('dt').innerHTML=`<span class="zona-dot" style="background:${c};width:11px;height:11px"></span>${z?.nombre||znId}`;
  document.getElementById('ds').textContent=`${z?.especie||''} ${z?.variedad||''} · ${z?.superficie_ha||'—'} ha`;
  document.getElementById('ddate').innerHTML=`${DSS[(d.getDay()||7)-1]} ${d.getDate()} ${MSS[d.getMonth()]} ${d.getFullYear()}<br>${past?'Aplicado':'Programado'}`;
  const ap=[{k:'N',c:'#2563EB',v:num(e.n_aplicado_kg)},{k:'P₂O₅',c:'#EA580C',v:num(e.p2o5_aplicado_kg)},{k:'K₂O',c:'#7C3AED',v:num(e.k2o_aplicado_kg)}];
  const otros=evs.length>1?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px">+${evs.length-1} producto(s) más este día: ${evs.slice(1).map(x=>prodShort(x.producto_asignado)).join(', ')}</div>`:'';
  const balRows=b?[...MACRO.map(m=>({k:m.k,c:m.c,pct:covMacro(znId,m)})),...MICRO.slice(0,4).map(mi=>({k:mi.k,c:mi.c,pct:covMicro(znId,mi)}))]:[];
  document.getElementById('db').innerHTML=`${otros}
    <div class="dcols">
      <div class="dcard" style="background:${cl};border-color:${c}33;margin-bottom:0">
        <div class="dcard-t"><i class="ti ti-flask-2"></i>Producto aplicado</div>
        <div class="dprod" style="color:${c}">${e.producto_asignado||'—'}</div>
        <div class="dprod-sub">${num(e.dosis_aplicar_kg).toFixed(1)} kg · ${e.semana||''}</div></div>
      <div class="dcard" style="margin-bottom:0">
        <div class="dcard-t"><i class="ti ti-atom-2"></i>Nutrientes aportados</div>
        <div class="naport">${ap.map(a=>`<div class="naport-c"><div class="naport-k" style="color:${a.c}">${a.k}</div><div class="naport-v">${a.v.toFixed(2)}</div><div class="naport-u">kg</div></div>`).join('')}</div></div>
    </div>
    <div class="dcard" style="margin-top:14px"><div class="dcard-t"><i class="ti ti-adjustments"></i>Parámetros de inyección</div>
      <div class="dcols" style="gap:0 24px">
        <div><div class="iny-row"><span class="iny-k">Tiempo fertirriego</span><span class="iny-v">${hm(e.tiempo_fertirriego_hrs)||'—'}</span></div>
        <div class="iny-row"><span class="iny-k">Tiempo de riego</span><span class="iny-v">${hm(e.tiempo_riego_hrs)||'—'}</span></div>
        <div class="iny-row"><span class="iny-k">Volumen riego</span><span class="iny-v">${num(e.volumen_riego_m3).toFixed(1)} m³</span></div></div>
        <div><div class="iny-row"><span class="iny-k">Concentración</span><span class="iny-v">${num(e.concentracion_ideal_grl).toFixed(1)} g/L</span></div>
        <div class="iny-row"><span class="iny-k">Caudal zona</span><span class="iny-v">${num(e.caudal_zona_m3h).toFixed(2)} m³/h</span></div>
        <div class="iny-row"><span class="iny-k">Inyección</span><span class="iny-v">${e.lh_inyeccion??'—'} L/h</span></div></div>
      </div>
      <div class="iny-row" style="border-top:1px solid var(--line2)"><span class="iny-k">Ratio inyección</span><span class="iny-v">${e.ratio_inyeccion||'—'}</span></div></div>
    ${b?`<div class="dcard"><div class="dcard-t"><i class="ti ti-chart-bar"></i>Balance nutricional de la zona</div>
      <table class="btbl"><thead><tr><th>Nutriente</th><th>Cob.</th><th>Estado</th></tr></thead><tbody>
      ${balRows.map(r=>{if(r.pct==null)return `<tr><td style="color:${r.c};font-weight:600">${r.k}</td><td class="r" style="color:var(--subtle)">s/d</td><td></td></tr>`;const pc=Math.round(r.pct);const w=Math.min(pc,100);return `<tr><td style="color:${r.c};font-weight:600">${r.k}</td><td class="r">${pc}%</td><td><div class="mini-track"><div class="mini-fill" style="width:${w}%;background:${r.c}"></div>${pc>100?`<div class="mini-over" style="width:${Math.min(pc-100,30)}%"></div>`:''}</div></td></tr>`;}).join('')}
      </tbody></table></div>`:''}
    ${b&&covMacro(znId,MACRO[1])>120?`<div class="reco"><i class="ti ti-bulb" style="font-size:18px;color:var(--z2);flex-shrink:0"></i><div><div class="reco-t">Recomendación</div><div class="reco-s">El fósforo (P₂O₅) superó el objetivo en esta zona. Considera una fórmula con mayor N y menor P para las próximas aplicaciones.</div></div></div>`:''}`;
  document.getElementById('scrim').classList.add('open');document.getElementById('drawer').classList.add('open');
}
function closeD(){document.getElementById('scrim').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeD();});

init();
</script>
</body>
</html>
