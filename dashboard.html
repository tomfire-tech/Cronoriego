<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CronoRiego — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --teal-900:#0f3a52;--teal-700:#1A5276;--teal-500:#2E86AB;--teal-50:#eaf3f8;
    --green-700:#1E8449;--green-500:#2fa365;--green-50:#ecf7f0;--green-900:#154a29;
    --amber:#d29922;--amber-bg:#fff8e6;
    --ink:#0e1f26;--ink-2:#344e5c;--muted:#6a8391;--line:#e4ecef;
    --bg:#f7faf9;--white:#ffffff;--danger:#c0392b;--danger-bg:#fdf2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

  /* TOPBAR */
  .topbar{background:var(--white);border-bottom:1px solid var(--line);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .brand{font-size:16px;font-weight:800;}
  .brand span:first-child{color:var(--teal-700);}
  .brand span:last-child{color:var(--green-700);}
  .topbar-right{display:flex;align-items:center;gap:16px;}
  .topbar-date{font-size:12px;color:var(--muted);}
  .topbar-semana{font-size:11px;font-weight:600;background:var(--teal-50);color:var(--teal-700);padding:3px 10px;border-radius:999px;}
  .user-btn{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:var(--white);}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--teal-700);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

  /* SELECTORS */
  .selectors{background:var(--white);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .sel-group{display:flex;align-items:center;gap:6px;}
  .sel-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .sel-group select{padding:6px 10px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--white);cursor:pointer;}
  .sel-group select:focus{outline:none;border-color:var(--teal-700);}
  .ndvi-chip{font-size:11px;font-weight:600;background:var(--green-50);color:var(--green-700);padding:4px 10px;border-radius:999px;border:1px solid rgba(30,132,73,.2);margin-left:auto;}

  /* HERO */
  .hero{background:linear-gradient(135deg,var(--teal-900),var(--teal-700));border-radius:14px;padding:22px 26px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
  .hero::after{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);pointer-events:none;}
  .hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:10px;}
  .hero-verb{font-family:'Fraunces',serif;font-size:clamp(24px,4vw,36px);font-weight:700;line-height:1.1;margin-bottom:10px;}
  .hero-sub{font-size:13px;opacity:.88;max-width:65ch;margin-bottom:16px;line-height:1.55;}
  .hero-meta{display:flex;gap:24px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.15);padding-top:14px;}
  .hm-item{display:flex;flex-direction:column;gap:2px;}
  .hm-val{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  .hm-label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;opacity:.7;}

  /* MAIN */
  .main{padding:20px 24px;max-width:1400px;margin:0 auto;}

  /* GRID */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
  @media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:1fr 1fr;}}
  @media(max-width:720px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

  /* CARD */
  .card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .card-title i{font-size:15px;color:var(--teal-500);}

  /* MÉTRICA COMPARATIVA */
  .metrica-comp{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px;}
  .metrica-comp:last-child{margin-bottom:0;}
  .metrica-titulo{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
  .metrica-fila{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .metrica-fila:last-child{margin-bottom:0;}
  .metrica-key{font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:6px;}
  .metrica-val{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  .metrica-val.est{color:var(--green-700);}
  .metrica-val.pron{color:var(--teal-700);}
  .metrica-val.cero{color:var(--muted);font-size:14px;}
  .tag-est{font-size:9px;font-weight:700;background:var(--green-50);color:var(--green-700);border-radius:4px;padding:2px 5px;letter-spacing:.04em;}
  .tag-pron{font-size:9px;font-weight:700;background:var(--teal-50);color:var(--teal-700);border-radius:4px;padding:2px 5px;letter-spacing:.04em;}
  .tag-sin{font-size:9px;font-weight:700;background:var(--bg);color:var(--muted);border-radius:4px;padding:2px 5px;border:1px solid var(--line);}

  /* KPI SIMPLE */
  .kpi{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .kpi-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .kpi-val{font-family:'Fraunces',serif;font-size:24px;font-weight:600;line-height:1;}
  .kpi-unit{font-size:11px;color:var(--muted);margin-top:3px;}
  .kpi-val.green{color:var(--green-700);}
  .kpi-val.teal{color:var(--teal-700);}
  .kpi-val.amber{color:var(--amber);}

  /* CALENDARIO */
  .cal-grid{display:grid;grid-template-columns:28px repeat(7,1fr);gap:2px;font-size:11px;}
  .cal-dh{text-align:center;color:var(--muted);padding:3px 0;font-weight:600;}
  .cal-wn{color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;}
  .cal-cell{background:var(--bg);border:0.5px solid var(--line);border-radius:4px;padding:3px 4px;min-height:48px;transition:all .15s;}
  .cal-cell.hoy{border:2px solid var(--teal-700);}
  .cal-cell.tiene-riego-est{background:#e8f5e9;border-color:rgba(30,132,73,.4);}
  .cal-cell.tiene-riego-pron{background:var(--teal-50);border-color:rgba(46,134,171,.3);}
  .cal-cell.tiene-ambos{background:linear-gradient(135deg,#e8f5e9 50%,var(--teal-50) 50%);border-color:rgba(30,132,73,.3);}
  .cal-cell.otro-mes{opacity:.2;}
  .cal-clickable{cursor:pointer;}
  .cal-clickable:hover{transform:scale(1.04);box-shadow:0 4px 12px rgba(14,31,38,.1);}
  .cal-dn{font-size:10px;font-weight:600;color:var(--ink-2);}
  .cal-cell.hoy .cal-dn{color:var(--teal-700);}
  .cal-ev-est{font-size:9px;color:var(--green-700);font-weight:700;margin-top:2px;}
  .cal-ev-pron{font-size:9px;color:var(--teal-700);font-weight:600;}
  .cal-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
  .cal-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
  .cal-leg-dot{width:8px;height:8px;border-radius:2px;}

  /* NDVI BAR */
  .ndvi-chart{display:flex;align-items:flex-end;gap:4px;height:55px;margin-top:8px;}
  .ndvi-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .ndvi-bar-item{width:100%;background:var(--green-500);border-radius:2px 2px 0 0;}
  .ndvi-date{font-size:9px;color:var(--muted);}

  /* DRAWER */
  .scrim{position:fixed;inset:0;background:rgba(14,31,38,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;right:0;top:0;height:100%;width:min(440px,92vw);background:var(--white);box-shadow:-4px 0 24px rgba(14,31,38,.12);z-index:201;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .drawer-head .dt{font-family:'Fraunces',serif;font-size:20px;font-weight:700;text-transform:capitalize;}
  .drawer-head .ds{font-size:12px;color:var(--muted);margin-top:2px;}
  .dclose{border:none;background:var(--bg);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);display:grid;place-items:center;}
  .drawer-body{padding:20px 22px;overflow-y:auto;flex:1;}

  /* MODAL CLAVE */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(14,31,38,.5);z-index:300;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--white);border-radius:16px;padding:28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(14,31,38,.2);}
  .form-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:6px;}
  .form-input{width:100%;padding:10px 40px 10px 12px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;position:relative;}
  .form-input:focus{border-color:var(--teal-700);}
  .inp-wrap{position:relative;margin-bottom:14px;}
  .eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--muted);font-size:16px;}
  .req{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:3px;}
  .req.ok{color:var(--green-700);}

  .loading{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
  .sin-rs{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>

<!-- DRAWER -->
<div class="scrim" id="scrim" onclick="cerrarDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div><div class="dt" id="dw-title">—</div><div class="ds" id="dw-sub">—</div></div>
    <button class="dclose" onclick="cerrarDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="dw-body"></div>
</aside>

<!-- MODAL CAMBIAR CLAVE -->
<div class="modal-overlay" id="modal-clave" onclick="if(event.target===this)cerrarClave()">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700">Cambiar contraseña</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Elige una contraseña segura</div>
      </div>
      <button onclick="cerrarClave()" style="border:none;background:var(--bg);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);display:grid;place-items:center;">✕</button>
    </div>
    <label class="form-label">Nueva contraseña</label>
    <div class="inp-wrap">
      <input type="password" id="inp-nueva" class="form-input" placeholder="Mínimo 8 caracteres" oninput="validarClave()">
      <button class="eye-btn" onclick="toggleVer('inp-nueva','ico-nueva')"><i class="ti ti-eye" id="ico-nueva"></i></button>
    </div>
    <label class="form-label">Confirmar contraseña</label>
    <div class="inp-wrap">
      <input type="password" id="inp-conf" class="form-input" placeholder="Repite la contraseña" oninput="validarClave()">
      <button class="eye-btn" onclick="toggleVer('inp-conf','ico-conf')"><i class="ti ti-eye" id="ico-conf"></i></button>
    </div>
    <div style="margin:8px 0 14px;">
      <div class="req" id="req-len"><i class="ti ti-circle" style="font-size:10px"></i> Mínimo 8 caracteres</div>
      <div class="req" id="req-num"><i class="ti ti-circle" style="font-size:10px"></i> Al menos un número</div>
      <div class="req" id="req-may"><i class="ti ti-circle" style="font-size:10px"></i> Al menos una mayúscula</div>
      <div class="req" id="req-match"><i class="ti ti-circle" style="font-size:10px"></i> Las contraseñas coinciden</div>
    </div>
    <div id="clave-msg" style="display:none;font-size:12px;padding:8px 12px;border-radius:7px;margin-bottom:12px;"></div>
    <button id="btn-guardar-clave" onclick="guardarClave()" disabled
      style="width:100%;padding:12px;background:var(--teal-700);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:not-allowed;opacity:.5;transition:all .2s;">
      Guardar contraseña
    </button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand"><span>CRONO</span><span>RIEGO</span></div>
  <div class="topbar-right">
    <span class="topbar-date" id="top-fecha">—</span>
    <span class="topbar-semana" id="top-semana">—</span>
    <div style="position:relative">
      <button class="user-btn" onclick="toggleMenu()" id="user-menu-btn">
        <div class="user-avatar" id="user-ini">—</div>
        <span id="user-email">—</span>
        <i class="ti ti-chevron-down" style="font-size:12px;color:var(--muted)"></i>
      </button>
      <div id="user-menu" style="display:none;position:absolute;right:0;top:calc(100% + 8px);background:var(--white);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(14,31,38,.12);min-width:180px;overflow:hidden;z-index:200;">
        <button onclick="abrirClave()" style="width:100%;text-align:left;padding:11px 16px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:10px;">
          <i class="ti ti-lock" style="font-size:15px;color:var(--muted)"></i> Cambiar contraseña
        </button>
        <div style="height:1px;background:var(--line);margin:0 12px"></div>
        <button onclick="logout()" style="width:100%;text-align:left;padding:11px 16px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--danger);cursor:pointer;display:flex;align-items:center;gap:10px;">
          <i class="ti ti-logout" style="font-size:15px"></i> Cerrar sesión
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SELECTORS -->
<div class="selectors">
  <div class="sel-group"><span class="sel-label">Predio</span><select id="sel-predio" onchange="onPredioChange()"><option>Cargando...</option></select></div>
  <div class="sel-group"><span class="sel-label">Equipo</span><select id="sel-equipo" onchange="onEquipoChange()"><option>Cargando...</option></select></div>
  <div class="sel-group"><span class="sel-label">Zona</span><select id="sel-zona" onchange="onZonaChange()"><option>Cargando...</option></select></div>
  <div class="ndvi-chip" id="ndvi-chip">NDVI —</div>
</div>

<!-- MAIN -->
<div class="main" id="main-content">
  <div class="loading"><i class="ti ti-loader" style="font-size:28px"></i><br><br>Cargando datos...</div>
</div>

<script>
const SUPABASE_URL = 'https://lmexinxdmkgexpthuosn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtZXhpbnhkbWtnZXhwdGh1b3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjgzMTQsImV4cCI6MjA5NTQwNDMxNH0.NiC1H1gDEKNbjob6XGGMu8Zaf2b4uLZLOuKzwioBgS0';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let _zona = null, _scDia = [], _ndvi = [];
let allData = {};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function n(v, dec=1, suf='') {
  const f = parseFloat(v);
  return isNaN(f) || f === 0 ? null : f.toFixed(dec) + suf;
}
function fmt(v, dec=1, suf='') { return n(v,dec,suf) || '—'; }
function hm(h) {
  const f = parseFloat(h);
  if (!f || f <= 0) return null;
  const hh = Math.floor(f), mm = Math.round((f-hh)*60);
  return mm===60 ? `${hh+1}h 00min` : `${hh}h ${String(mm).padStart(2,'0')}min`;
}
function isoWeek(d) {
  const dc = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  dc.setUTCDate(dc.getUTCDate()+4-(dc.getUTCDay()||7));
  const y = new Date(Date.UTC(dc.getUTCFullYear(),0,1));
  return Math.ceil(((dc-y)/86400000+1)/7);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function checkAuth() {
  const { data:{session} } = await db.auth.getSession();
  if (!session) { window.location.href='login.html'; return null; }
  return session;
}
async function logout() { await db.auth.signOut(); window.location.href='login.html'; }

// ── MENÚ ──────────────────────────────────────────────────────────────────────
function toggleMenu() {
  const m = document.getElementById('user-menu');
  m.style.display = m.style.display==='none' ? 'block' : 'none';
}
document.addEventListener('click', e => {
  const btn = document.getElementById('user-menu-btn');
  const m   = document.getElementById('user-menu');
  if (btn && !btn.contains(e.target) && m && !m.contains(e.target)) m.style.display='none';
});

// ── CAMBIAR CLAVE ─────────────────────────────────────────────────────────────
function abrirClave() {
  document.getElementById('user-menu').style.display='none';
  document.getElementById('inp-nueva').value='';
  document.getElementById('inp-conf').value='';
  document.getElementById('clave-msg').style.display='none';
  document.getElementById('btn-guardar-clave').disabled=true;
  document.getElementById('btn-guardar-clave').style.opacity='.5';
  validarClave();
  document.getElementById('modal-clave').classList.add('open');
}
function cerrarClave() { document.getElementById('modal-clave').classList.remove('open'); }
function toggleVer(id,ico) {
  const i=document.getElementById(id); const ic=document.getElementById(ico);
  i.type=i.type==='password'?'text':'password';
  ic.className=i.type==='text'?'ti ti-eye-off':'ti ti-eye';
}
function setReq(id,ok) {
  const el=document.getElementById(id); if(!el)return;
  el.className='req'+(ok?' ok':'');
  el.querySelector('i').className=ok?'ti ti-circle-check':'ti ti-circle';
  el.querySelector('i').style.fontSize='10px';
}
function validarClave() {
  const a=document.getElementById('inp-nueva').value;
  const b=document.getElementById('inp-conf').value;
  const l=a.length>=8, num=/[0-9]/.test(a), may=/[A-Z]/.test(a), match=a===b&&a.length>0;
  setReq('req-len',l); setReq('req-num',num); setReq('req-may',may); setReq('req-match',match);
  const ok=l&&num&&may&&match;
  const btn=document.getElementById('btn-guardar-clave');
  btn.disabled=!ok; btn.style.opacity=ok?'1':'.5'; btn.style.cursor=ok?'pointer':'not-allowed';
}
async function guardarClave() {
  const pw=document.getElementById('inp-nueva').value;
  const btn=document.getElementById('btn-guardar-clave');
  const msg=document.getElementById('clave-msg');
  btn.disabled=true; btn.textContent='Guardando...';
  const {error}=await db.auth.updateUser({password:pw});
  msg.style.display='block';
  if (error) {
    msg.style.cssText='display:block;background:var(--danger-bg);color:var(--danger);border:1px solid rgba(192,57,43,.2);font-size:12px;padding:8px 12px;border-radius:7px;margin-bottom:12px;';
    msg.textContent='Error: '+error.message;
    btn.disabled=false; btn.textContent='Guardar contraseña';
  } else {
    msg.style.cssText='display:block;background:var(--green-50);color:var(--green-700);border:1px solid rgba(30,132,73,.2);font-size:12px;padding:8px 12px;border-radius:7px;margin-bottom:12px;';
    msg.textContent='✓ Contraseña actualizada';
    btn.textContent='✓ Listo';
    setTimeout(()=>cerrarClave(),2000);
  }
}

// ── DRAWER ────────────────────────────────────────────────────────────────────
function abrirDrawer(titulo,sub,html) {
  document.getElementById('dw-title').textContent=titulo;
  document.getElementById('dw-sub').textContent=sub;
  document.getElementById('dw-body').innerHTML=html;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function cerrarDrawer() {
  document.getElementById('scrim').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){cerrarDrawer();cerrarClave();}});

// ── FECHA ─────────────────────────────────────────────────────────────────────
function initFecha() {
  const t=new Date();
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('top-fecha').textContent=`${dias[t.getDay()]} ${t.getDate()} de ${meses[t.getMonth()]}`;
  document.getElementById('top-semana').textContent=`Semana ISO ${isoWeek(t)}`;
}

// ── QUERIES — SOLO sc_* y ndvi_registros ──────────────────────────────────────
async function cargarPredios(rsId) {
  const {data}=await db.from('v_predios').select('*').eq('id_rs',rsId);
  return data||[];
}
async function cargarEquipos(prId) {
  const {data}=await db.from('v_equipos').select('*').eq('id_predio',prId);
  return data||[];
}
async function cargarZonas(eqId) {
  const {data}=await db.from('v_zonas').select('*').eq('id_equipo',eqId).eq('activa','Sí');
  return data||[];
}
async function cargarNdvi(zId) {
  const {data}=await db.from('ndvi_registros').select('"ID Zona Relacional (PK)","Fecha","NDVI","Kc"')
    .eq('ID Zona Relacional (PK)',zId)
    .order('Fecha',{ascending:false}).limit(8);
  return data||[];
}
async function cargarScDiaria(zId) {
  // Últimos 60 días + próximos 30 (la tabla tiene datos históricos y futuros)
  const {data}=await db.from('sc_demanda_hidrica_diaria_zona').select(
    'fecha,id_zona,ndvi,kc,'+
    'eto_estacion_mm_dia,eto_pronostico_mm_dia,'+
    'etc_estacion_mm_dia,etc_pronostico_mm_dia,'+
    'lamina_neta_riego_estacion_mm,lamina_neta_riego_pronostico_mm,'+
    'tiempo_de_riego_estacion_horas,tiempo_de_riego_pronostico_horas,'+
    'lluvia_estacion_mm_dia,lluvia_pronostico_mm_dia,'+
    'deficit_hidrico_controlado'
  ).eq('id_zona',zId).order('fecha',{ascending:true});
  return data||[];
}
async function cargarScSemanal(eqId) {
  const {data}=await db.from('sc_demanda_hidrica_semanal_equipo').select('*')
    .eq('id_equipo',eqId).order('numero_semana',{ascending:false}).limit(8);
  return data||[];
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const session=await checkAuth(); if(!session)return;
  initFecha();
  const email=session.user.email;
  document.getElementById('user-email').textContent=email.split('@')[0];
  document.getElementById('user-ini').textContent=email[0].toUpperCase();

  const {data:u}=await db.from('v_usuarios').select('*').eq('email',email).limit(1);
  const rsId=u?.[0]?.id_rs||null;

  if (!rsId) {
    document.getElementById('main-content').innerHTML=`
      <div class="sin-rs">
        <i class="ti ti-alert-circle" style="font-size:40px;color:var(--amber);display:block;margin-bottom:12px"></i>
        <div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px">Cuenta no configurada</div>
        <div style="font-size:13px">Tu cuenta aún no tiene predios asignados.<br>Contacta al administrador de CronoRiego.</div>
      </div>`;
    return;
  }

  const predios=await cargarPredios(rsId);
  allData.predios=predios;
  const sel=document.getElementById('sel-predio');
  sel.innerHTML=predios.map(p=>`<option value="${p.id_predio}">${p.nombre}</option>`).join('');
  if(predios.length>0) await onPredioChange();
}

async function onPredioChange() {
  const prId=document.getElementById('sel-predio').value;
  const equipos=await cargarEquipos(prId);
  allData.equipos=equipos;
  const sel=document.getElementById('sel-equipo');
  sel.innerHTML=equipos.length
    ? equipos.map(e=>`<option value="${e.id_equipo}">${e.nombre}</option>`).join('')
    : '<option value="">Sin equipos</option>';
  if(equipos.length>0) await onEquipoChange();
}

async function onEquipoChange() {
  const eqId=document.getElementById('sel-equipo').value;
  const zonas=await cargarZonas(eqId);
  allData.zonas=zonas;
  const sel=document.getElementById('sel-zona');
  sel.innerHTML=zonas.length
    ? zonas.map(z=>`<option value="${z.id_zona}">${z.id_zona} — ${z.nombre} (${z.especie})</option>`).join('')
    : '<option value="">Sin zonas</option>';
  if(zonas.length>0) await onZonaChange();
}

async function onZonaChange() {
  const zId=document.getElementById('sel-zona').value;
  const eqId=document.getElementById('sel-equipo').value;
  const zona=allData.zonas?.find(z=>z.id_zona===zId);
  if(!zona)return;
  _zona=zona;
  document.getElementById('main-content').innerHTML='<div class="loading"><i class="ti ti-loader" style="font-size:24px"></i><br><br>Cargando zona...</div>';

  const [ndvi,scDia]=await Promise.all([cargarNdvi(zId),cargarScDiaria(zId)]);
  _ndvi=ndvi; _scDia=scDia;

  // NDVI chip
  const ndviActual=ndvi[0];
  if(ndviActual) {
    document.getElementById('ndvi-chip').textContent=
      `NDVI ${parseFloat(ndviActual['NDVI']).toFixed(3)} · Kc ${parseFloat(ndviActual['Kc']).toFixed(2)}`;
  } else {
    document.getElementById('ndvi-chip').textContent='NDVI —';
  }

  renderDashboard(zona,ndvi,scDia);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderDashboard(zona,ndvi,scDia) {
  const hoy=new Date();
  const hoyStr=hoy.toISOString().slice(0,10);

  // Datos de hoy o más reciente con datos
  const diaHoy=scDia.find(r=>r.fecha===hoyStr);
  const diaReciente=scDia.slice().reverse().find(r=>

    .reduce((s,r)=>s+(parseFloat(r.eto_pronostico_mm_dia)||0),0);
  const etoEst7=scDia.filter(r=>{const f=new Date(r.fecha);return f>=new Date(hoy-7*86400000)&&f<=hoy;})
    .reduce((s,r)=>s+(parseFloat(r.eto_estacion_mm_dia)||0),0);

  // Próximo riego desde sc_demanda
  const proxRiego=scDia.find(r=>{
    const f=new Date(r.fecha+'T00:00:00');
    return f>hoy&&(parseFloat(r.lamina_neta_riego_pronostico_mm)>0||parseFloat(r.lamina_neta_riego_estacion_mm)>0);
  });
  const diasHastaRiego=proxRiego?Math.ceil((new Date(proxRiego.fecha+'T00:00:00')-hoy)/86400000):null;
  const tieneRiegoHoy=diaHoy&&(parseFloat(diaHoy.lamina_neta_riego_estacion_mm)>0||parseFloat(diaHoy.lamina_neta_riego_pronostico_mm)>0);

  // Hero texto
  let heroVerb, heroSub;

    heroVerb=`Próximo riego en ${diasHastaRiego} día${diasHastaRiego!==1?'s':''}`;
    heroSub=`El suelo tiene reserva suficiente. Monitorea el pronóstico de la próxima semana.`;
  } else {
    heroVerb='Sin eventos de riego programados';
    heroSub='No hay datos de riego disponibles para esta zona en el período actual.';
  }

  document.getElementById('main-content').innerHTML=`

    <!-- HERO -->
    <div class="hero">
      <div class="hero-eyebrow">Hoy en tu zona — ${zona.id_zona} · ${zona.especie||''} ${zona.variedad||''}</div>
      <div class="hero-verb">${heroVerb}</div>
      <p class="hero-sub">${heroSub}</p>
      <div class="hero-meta">
        <div class="hm-item">
          <div class="hm-val">${ndviVal?ndviVal.toFixed(3):'—'}</div>
          <div class="hm-label">NDVI actual</div>
        </div>
        <div class="hm-item">
          <div class="hm-val">${kcVal?kcVal.toFixed(2):'—'}</div>
          <div class="hm-label">Kc ajustado</div>
        </div>
        <div class="hm-item">
          <div class="hm-val">${etoEst7>0?etoEst7.toFixed(1)+'mm':etoPron7>0?etoPron7.toFixed(1)+'mm':'—'}</div>
          <div class="hm-label">ETo 7 días</div>
        </div>
        <div class="hm-item">
          <div class="hm-val">${zona.superficie_ha||'—'} ha</div>
          <div class="hm-label">Superficie</div>
        </div>
      </div>
    </div>

    <!-- KPIs NDVI -->
    <div class="grid-4" style="margin-bottom:14px;">
      <div class="kpi">
        <div class="kpi-label">NDVI</div>
        <div class="kpi-val green">${ndviVal?ndviVal.toFixed(3):'—'}</div>
        <div class="kpi-unit">${ndvi[0]?'Fecha: '+ndvi[0]['Fecha']:'Sin datos'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Kc ajustado</div>
        <div class="kpi-val teal">${kcVal?kcVal.toFixed(3):'—'}</div>
        <div class="kpi-unit">Coeficiente cultivo</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">ETo Estación 7d</div>

          <div class="cal-leg-item"><div class="cal-leg-dot" style="background:var(--teal-50);border:1px solid rgba(46,134,171,.3)"></div>Riego pronóstico</div>

    </div>

    <!-- NDVI HISTÓRICO -->
    <div class="grid-2">
      <div class="card">

        ${renderNdviChart(ndvi)}
        <div style="margin-top:14px;">
          ${ndvi.slice(0,4).map(v=>`

function renderComparativa(dia) {
  if(!dia) return `<div style="font-size:13px;color:var(--muted);text-align:center;padding:20px">Sin datos de riego disponibles para esta zona.</div>`;

  const lamEst  = parseFloat(dia.lamina_neta_riego_estacion_mm)||0;
  const lamPron = parseFloat(dia.lamina_neta_riego_pronostico_mm)||0;
  const tEst    = parseFloat(dia.tiempo_de_riego_estacion_horas)||0;
  const tPron   = parseFloat(dia.tiempo_de_riego_pronostico_horas)||0;
  const etoEst  = parseFloat(dia.eto_estacion_mm_dia)||0;
  const etoPron = parseFloat(dia.eto_pronostico_mm_dia)||0;
  const etcEst  = parseFloat(dia.etc_estacion_mm_dia)||0;
  const etcPron = parseFloat(dia.etc_pronostico_mm_dia)||0;
  const lluvEst = parseFloat(dia.lluvia_estacion_mm_dia)||0;
  const lluvPron= parseFloat(dia.lluvia_pronostico_mm_dia)||0;

  function fila(label,est,pron,dec=1,suf='') {
    const eV=est?est.toFixed(dec)+suf:null;
    const pV=pron?pron.toFixed(dec)+suf:null;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);">
      <span style="font-size:12px;color:var(--muted);flex:1">${label}</span>
      <span style="font-size:14px;font-weight:700;color:var(--green-700);min-width:80px;text-align:right">${eV||'<span style="color:var(--muted);font-weight:400;font-size:12px">sin dato</span>'}</span>
      <span style="font-size:14px;font-weight:700;color:var(--teal-700);min-width:80px;text-align:right">${pV||'<span style="color:var(--muted);font-weight:400;font-size:12px">sin dato</span>'}</span>
    </div>`;
  }

  return `
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px;">
      <span class="tag-est">🌡 Estación</span>
      <span class="tag-pron">📡 Pronóstico</span>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Ref: ${dia.fecha}</div>
    ${fila('ETo (mm/día)',etoEst,etoPron)}
    ${fila('ETc (mm/día)',etcEst,etcPron)}
    ${fila('Lluvia (mm)',lluvEst,lluvPron)}
    ${fila('Lámina de riego (mm)',lamEst,lamPron)}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">
      <span style="font-size:12px;color:var(--muted);flex:1">Tiempo de riego</span>
      <span style="font-size:14px;font-weight:700;color:var(--green-700);min-width:80px;text-align:right">${hm(tEst)||'<span style="color:var(--muted);font-weight:400;font-size:12px">sin dato</span>'}</span>
      <span style="font-size:14px;font-weight:700;color:var(--teal-700);min-width:80px;text-align:right">${hm(tPron)||'<span style="color:var(--muted);font-weight:400;font-size:12px">sin dato</span>'}</span>
    </div>
  `;
}

function renderCalendario(scDia,zona) {
  const hoy=new Date();
  const mes=hoy.getMonth(), año=hoy.getFullYear();
  const diasMes=new Date(año,mes+1,0).getDate();
  const primerDia=new Date(año,mes,1).getDay();
  const offset=primerDia===0?6:primerDia-1;

  // Mapear datos del mes
  const dataMap={};
  scDia.forEach(r=>{
    const f=new Date(r.fecha+'T00:00:00');
    if(f.getMonth()===mes&&f.getFullYear()===año) {
      dataMap[f.getDate()]=r;
    }
  });

  const diasSem=['L','M','X','J','V','S','D'];
  let html=`<div class="cal-grid"><div></div>${diasSem.map(d=>`<div class="cal-dh">${d}</div>`).join('')}`;

  let dia=1-offset;
  for(let s=0;s<5;s++) {
    const fw=new Date(año,mes,Math.max(1,dia+offset));
    html+=`<div class="cal-wn">${isoWeek(fw)}</div>`;
    for(let d=0;d<7;d++,dia++) {
      const ok=dia>=1&&dia<=diasMes;
      const esHoy=dia===hoy.getDate()&&ok;
      const r=ok?dataMap[dia]:null;
      const lamEst=r?parseFloat(r.lamina_neta_riego_estacion_mm)||0:0;
      const lamPron=r?parseFloat(r.lamina_neta_riego_pronostico_mm)||0:0;
      const tieneEst=lamEst>0;
      const tienePron=lamPron>0;
      const tieneAmbos=tieneEst&&tienePron;

      let cls='cal-cell'+(ok?'':' otro-mes')+(esHoy?' hoy':'');
      if(tieneAmbos) cls+=' tiene-ambos cal-clickable';
      else if(tieneEst) cls+=' tiene-riego-est cal-clickable';
      else if(tienePron) cls+=' tiene-riego-pron cal-clickable';

      html+=`<div class="${cls}" ${(tieneEst||tienePron)&&ok?`onclick="abrirDia(${dia})"`:''}> 
        <div class="cal-dn">${ok?dia:''}</div>
        ${tieneEst?`<div class="cal-ev-est">${lamEst.toFixed(0)}mm</div>`:''}
        ${tienePron&&!tieneEst?`<div class="cal-ev-pron">${lamPron.toFixed(0)}mm</div>`:''}
        ${tienePron&&tieneEst?`<div class="cal-ev-pron">${lamPron.toFixed(0)}p</div>`:''}
      </div>`;
    }
  }
  html+='</div>';
  return html;
}

function abrirDia(dia) {
  const hoy=new Date();
  const mes=hoy.getMonth(), año=hoy.getFullYear();
  const fecha=`${año}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
  const r=_scDia.find(d=>d.fecha===fecha);
  if(!r)return;

  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const dt=new Date(fecha+'T00:00:00');
  const titulo=`${dias[dt.getDay()]} ${dia} de ${meses[mes]}`;

  const lamEst  = parseFloat(r.lamina_neta_riego_estacion_mm)||0;
  const lamPron = parseFloat(r.lamina_neta_riego_pronostico_mm)||0;
  const tEst    = parseFloat(r.tiempo_de_riego_estacion_horas)||0;
  const tPron   = parseFloat(r.tiempo_de_riego_pronostico_horas)||0;
  const etoEst  = parseFloat(r.eto_estacion_mm_dia)||0;
  const etoPron = parseFloat(r.eto_pronostico_mm_dia)||0;
  const etcEst  = parseFloat(r.etc_estacion_mm_dia)||0;
  const etcPron = parseFloat(r.etc_pronostico_mm_dia)||0;

  function row(label,est,pron,suf='') {
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;">
      <span style="color:var(--muted)">${label}</span>
      <div style="display:flex;gap:16px;">
        <span style="color:var(--green-700);font-weight:600;min-width:70px;text-align:right">${est?est+suf:'—'}</span>
        <span style="color:var(--teal-700);font-weight:600;min-width:70px;text-align:right">${pron?pron+suf:'—'}</span>
      </div>
    </div>`;
  }

  const html=`
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;">
      <span class="tag-est">🌡 Estación</span>
      <span class="tag-pron">📡 Pronóstico</span>
    </div>
    ${row('ETo (mm/día)',etoEst?etoEst.toFixed(2):null,etoPron?etoPron.toFixed(2):null)}
    ${row('ETc (mm/día)',etcEst?etcEst.toFixed(2):null,etcPron?etcPron.toFixed(2):null)}
    ${row('Lámina riego (mm)',lamEst?lamEst.toFixed(1):null,lamPron?lamPron.toFixed(1):null)}
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;">
      <span style="color:var(--muted)">Tiempo de riego</span>
      <div style="display:flex;gap:16px;">
        <span style="color:var(--green-700);font-weight:600;min-width:70px;text-align:right">${hm(tEst)||'—'}</span>
        <span style="color:var(--teal-700);font-weight:600;min-width:70px;text-align:right">${hm(tPron)||'—'}</span>
      </div>
    </div>
    ${lamEst>0&&lamPron>0?`
    <div style="margin-top:16px;background:var(--bg);border-radius:8px;padding:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Comparativa</div>
      <div style="font-size:12px;color:var(--ink-2)">
        Diferencia lámina: <strong style="color:${Math.abs(lamEst-lamPron)<5?'var(--green-700)':'var(--amber)'}">
        ${(lamEst-lamPron>0?'+':'')}${(lamEst-lamPron).toFixed(1)} mm</strong>
      </div>
      <div style="font-size:12px;color:var(--ink-2);margin-top:4px">
        Diferencia tiempo: <strong>${hm(Math.abs(tEst-tPron))||'—'}</strong>
      </div>
    </div>`:''} 
  `;

  abrirDrawer(titulo,`${_zona?.id_zona||''} · ${_zona?.especie||''}`,html);
}

function renderNdviChart(ndvi) {
  if(!ndvi||ndvi.length<2) return '<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px">Sin historial NDVI disponible</div>';
  const vals=ndvi.slice(0,6).reverse();
  const max=Math.max(...vals.map(v=>parseFloat(v['NDVI'])||0));
  return `<div class="ndvi-chart">
    ${vals.map(v=>{
      const pct=max>0?(parseFloat(v['NDVI'])/max*100):0;
      return `<div class="ndvi-bar-wrap">
        <div class="ndvi-bar-item" style="height:${pct}%"></div>
        <div class="ndvi-date">${v['Fecha']?.toString().slice(5)||''}</div>
      </div>`;
    }).join('')}
  </div>`;
}

init();
</script>
</body>
</html>
